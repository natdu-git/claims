<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f2f0e9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Claims">
<title>Claims</title>
<style>
  :root{
    --ink:#1f1e1d;
    --ink-soft:#73716b;
    --paper:#f2f0e9;
    --surface:#ffffff;
    --soft:#efece3;
    --line:#e6e2d7;
    --line-strong:#d3cfc2;
    --line-soft:#efece4;
    --jade:#c96442;
    --jade-deep:#a94f33;
    --slate:#8a887f;      /* unclaimed */
    --amber:#b07636;      /* submitted / outstanding */
    --green:#5f7a4d;      /* reimbursed */
    --danger:#b3402f;
    --mono:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --r:14px;
    --safe-b:env(safe-area-inset-bottom,0px);
    --text-nav:12px;
    --weight-regular:400;
    --weight-medium:500;
    --weight-semibold:600;
    --weight-bold:700;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    font-size:16px;
    line-height:1.4;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(62px + var(--safe-b));
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
  .hidden{display:none !important;}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:20;
    background:var(--surface);color:var(--ink);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 16px;
  }
  .topbar .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--ink-soft);}
  .topbar .brand .dot{width:7px;height:7px;border-radius:2px;background:var(--jade);}
  .action-summary{display:flex;gap:18px;margin-top:14px;}
  .action-summary .side{width:50%;min-width:0;}
  .action-summary .side:last-child{text-align:right;}
  .action-summary .lab{font-size:11.5px;color:var(--ink-soft);}
  .action-summary .amounts{font-family:var(--mono);font-size:18px;font-weight:650;line-height:1.35;margin-top:3px;overflow-wrap:anywhere;}

  /* ---------- Filter chips ---------- */
  .filters{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:500;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .chip .x{font-size:15px;line-height:1;opacity:.7;}

  /* ---------- Log rows ---------- */
  .log{padding:8px 0 0;}
  .day-head{padding:16px 18px 6px;font-size:13px;font-weight:600;color:var(--ink-soft);}
  .day-group{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);overflow:hidden;margin:0 12px;}
  .row{display:flex;align-items:stretch;position:relative;}
  .row:active{background:#f6f8fa;}
  .row .accent{width:5px;flex:none;}
  .row-div{height:1px;background:var(--line-soft);margin-left:18px;}
  .row .body{flex:1;min-width:0;padding:11px 13px;}
  .noproof-top{position:absolute;top:9px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--amber);font-weight:600;white-space:nowrap;z-index:1;}
  .rline1{display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .rline1 .vendor{font-weight:600;font-size:15px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rline1 .amt-main{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;font-size:15.5px;color:var(--ink);white-space:nowrap;flex:none;letter-spacing:-.02em;}
  .amt-conv{color:var(--slate);font-weight:500;}
  .amt-need{color:var(--amber);font-weight:500;}
  .rline2{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-top:4px;}
  .rline2 .meta{font-size:12.5px;color:var(--slate);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rline2 .cur{font-size:10.5px;font-weight:600;letter-spacing:.04em;color:var(--slate);white-space:nowrap;flex:none;}
  .row-status{display:flex;justify-content:flex-end;align-items:baseline;text-align:right;min-width:0;max-width:58%;flex:0 1 auto;white-space:nowrap;overflow:hidden;}
  .claim-id-part{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .claim-separator,.status-part{flex:none;}
  .claim-id-inline{font-size:10px;font-weight:500;color:var(--slate);}
  .claim-id-warning{color:var(--danger);}
  .row .type-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:1px 5px;border-radius:4px;margin-right:6px;vertical-align:1px;}
  .type-travel{background:#e5f3f1;color:var(--jade-deep);}
  .type-expense{background:#eef0f2;color:var(--ink-soft);}
  .co-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:0;}
  .row-tags{font-size:11px;color:var(--slate);margin-top:3px;line-height:1.3;}
  .st-word-unclaimed{color:var(--slate);}
  .st-word-submitted{color:var(--amber);}
  .st-word-reimbursed{color:var(--green);}
  .swatches{display:flex;flex-wrap:wrap;gap:10px;}
  .swatch{width:30px;height:30px;border-radius:50%;border:2px solid rgba(0,0,0,.12);}
  .swatch.on{outline:2px solid var(--ink);outline-offset:2px;}

  /* status accents */
  .st-unclaimed{background:var(--slate);}
  .st-submitted{background:var(--amber);}
  .st-reimbursed{background:var(--green);}
  .st-rejected{background:var(--danger);}

  .empty{text-align:center;color:var(--slate);padding:60px 30px;}
  .empty h3{color:var(--ink);font-weight:600;margin:0 0 6px;}
  .empty p{margin:0;font-size:14px;}

  /* ---------- Bottom nav + FAB ---------- */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:45;
    background:var(--surface);border-top:1px solid var(--line);
    display:flex;padding:3px 6px calc(3px + var(--safe-b));
  }
  body.form-open .tabbar{display:none;}
  .tabbar button{flex:1;padding:4px 4px;font-family:var(--sans);font-size:var(--text-nav);font-weight:var(--weight-medium);color:var(--slate);display:flex;flex-direction:column;align-items:center;gap:1px;border-radius:8px;line-height:1.1;}
  .tabbar button.active{color:var(--jade);}
  .tabbar button svg{width:18px;height:18px;}
  .fab{
    position:fixed;right:18px;bottom:calc(54px + var(--safe-b));z-index:31;
    width:52px;height:52px;border-radius:16px;background:var(--jade);color:#fff;
    box-shadow:0 8px 22px rgba(15,118,110,.4);
    display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:300;
  }
  .fab:active{transform:scale(.94);}

  /* ---------- Screen (overlay) ---------- */
  .screen{
    position:fixed;inset:0;z-index:40;background:var(--paper);
    transform:translateX(100%);transition:transform .22s ease;
    display:flex;flex-direction:column;
  }
  .screen.show{transform:translateX(0);}
  .screen-head{
    position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top,0px) + 12px) 14px 12px;
    display:flex;align-items:center;gap:10px;
  }
  .screen-head .back{font-size:15px;font-weight:600;color:var(--jade);padding:4px 6px;display:flex;align-items:center;gap:3px;}
  .screen-head h2{font-size:17px;font-weight:700;margin:0;flex:1;text-align:center;}
  .screen-head .right{min-width:64px;text-align:right;}
  .screen-head .right button{color:var(--jade);font-weight:700;font-size:15px;padding:4px 6px;}
  .screen-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 14px calc(70px + var(--safe-b));}

  /* ---------- Form ---------- */
  .field{margin-bottom:12px;}
  .field > label{display:block;font-size:13px;font-weight:500;letter-spacing:0;text-transform:none;color:var(--ink-soft);margin-bottom:6px;}
  .field .req{color:var(--danger);}
  .field .opt{color:var(--slate);font-weight:500;text-transform:none;letter-spacing:0;font-size:11px;}
  input[type=text],input[type=number],input[type=date],textarea,select{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface);
    outline:none;transition:border-color .15s;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--jade);box-shadow:0 0 0 3px rgba(15,118,110,.12);}
  textarea{resize:vertical;min-height:56px;}
  .lrow{display:flex;align-items:center;gap:12px;}
  .lrow > label{width:33%;flex:none;font-size:13px;font-weight:500;color:var(--ink-soft);margin:0;}
  .lrow.tall{align-items:flex-start;}
  .lrow.tall > label{padding-top:9px;}
  .lrow > .lctl{flex:1;min-width:0;display:flex;justify-content:flex-end;}
  .lctl > *{width:100%;}
  .lctl > .switch{width:auto;}
  .lrow .lctl input[type=text]{text-align:right;}
  .lctl .tag-search{text-align:left;}
  .lbreak{border-top:1px solid var(--line);}
  #backupBanner{display:none;}
  .bkp-inner{display:flex;align-items:center;gap:10px;justify-content:space-between;background:#fbe7e2;border:1px solid #e9c3b6;color:#8a3b22;border-radius:11px;padding:9px 12px;margin:10px 14px 0;font-size:12.5px;line-height:1.35;}
  .bkp-inner button{background:var(--jade);color:#fff;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;white-space:nowrap;flex:none;}
  .date-wrap{position:relative;}
  .date-text{display:block;width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface);font-size:16px;color:var(--ink);}
  .date-overlay{position:absolute;inset:0;width:100%;height:100%;opacity:0;}
  .amount-row{display:flex;gap:0;}
  .amount-row input{flex:1;font-family:var(--mono);font-size:20px;font-weight:600;text-align:right;letter-spacing:-.02em;border-top-right-radius:0;border-bottom-right-radius:0;}
  .amount-row select{width:62px;flex:none;font-weight:400;font-size:14px;color:var(--ink-soft);border-top-left-radius:0;border-bottom-left-radius:0;border-left:none;padding-left:6px;padding-right:4px;}

  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:10px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface);font-weight:600;font-size:15px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:7px;}
  .seg button .ic{font-size:20px;}
  .seg button.on{border-color:var(--jade);background:#effaf8;color:var(--jade-deep);}

  .picker-list{display:flex;flex-wrap:wrap;gap:8px;}
  .pill{padding:9px 14px;border:1.5px solid var(--line);border-radius:999px;background:var(--surface);font-weight:600;font-size:14px;color:var(--ink-soft);}
  .pill.on{border-color:var(--jade);background:#effaf8;color:var(--jade-deep);}
  .pill.add{border-style:dashed;color:var(--slate);}

  .tag{padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:13.5px;font-weight:500;color:var(--ink-soft);}
  .tag.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tag.more,.tag.add{background:var(--soft);border-style:dashed;color:var(--slate);}
  .tag-search{margin-bottom:8px;font-size:14px;}

  .loc-box{border:1px solid var(--line);border-radius:11px;padding:11px;background:var(--surface);}
  .loc-coords{font-family:var(--mono);font-size:13px;color:var(--ink-soft);}
  .btn{display:block;width:100%;text-align:center;padding:14px;border-radius:12px;font-weight:600;font-size:15px;}
  .btn-primary{background:var(--jade);color:#fff;}
  .btn-primary:active{background:var(--jade-deep);}
  .btn-primary:disabled{background:#a9c4c0;}
  .btn-positive{background:var(--green);color:#fff;border:1.5px solid var(--green);}
  .btn-positive:active{filter:brightness(.9);}
  .btn-positive:disabled{background:#aeb9a7;color:#f5f5f2;border-color:#aeb9a7;cursor:default;}
  .btn-ghost{background:var(--surface);color:var(--jade);border:1.5px solid var(--line);}
  .btn-danger{background:#fdecec;color:var(--danger);border:1.5px solid #f3cccc;}
  .btn-sm{padding:9px 13px;font-size:13.5px;border-radius:10px;}
  .btn-row{display:flex;gap:10px;margin-top:8px;}
  .btn-row .btn{flex:1;}

  .proofs{display:flex;flex-wrap:wrap;gap:10px;}
  .proof-thumb{position:relative;width:78px;height:78px;border-radius:11px;overflow:hidden;border:1px solid var(--line);background:#f0f3f6;display:flex;align-items:center;justify-content:center;}
  .proof-thumb img{width:100%;height:100%;object-fit:cover;}
  .proof-thumb .pdf{font-size:11px;font-weight:700;color:var(--danger);}
  .proof-thumb .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;width:20px;height:20px;border-radius:50%;font-size:13px;line-height:20px;text-align:center;}
  .add-proof{width:78px;height:78px;border-radius:11px;border:1.5px dashed var(--line);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--slate);font-size:11px;font-weight:600;}
  .add-proof .plus{font-size:22px;font-weight:300;line-height:1;}

  /* image cropper */
  .cropper-ov{position:fixed;inset:0;background:rgba(24,22,20,.94);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px;}
  .cropper-title{color:#f2f0e9;font-size:13px;opacity:.85;text-align:center;}
  .cropper-stage{position:relative;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;line-height:0;}
  .cropper-stage img{display:block;-webkit-user-drag:none;}
  .crop-box{position:absolute;border:2px solid #fff;box-shadow:0 0 0 9999px rgba(0,0,0,.5);box-sizing:border-box;cursor:move;}
  .crop-h{position:absolute;width:22px;height:22px;background:var(--jade);border:2px solid #fff;border-radius:50%;box-sizing:border-box;}
  .crop-h.tl{left:-12px;top:-12px;} .crop-h.tr{right:-12px;top:-12px;}
  .crop-h.bl{left:-12px;bottom:-12px;} .crop-h.br{right:-12px;bottom:-12px;}
  .cropper-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

  /* claim print sheet */
  .print-host{position:fixed;inset:0;background:#fff;color:#1f1e1d;z-index:10000;overflow:auto;padding:16px 18px;-webkit-overflow-scrolling:touch;}
  .print-actions{display:flex;gap:10px;position:sticky;top:0;background:#fff;padding-bottom:10px;}
  .psheet h2{font-size:19px;margin:6px 0 8px;}
  .psheet .pmeta{color:#666;font-size:12.5px;margin-bottom:14px;}
  .psummary{max-width:380px;margin-bottom:18px;font-size:13px;}
  .pitem{display:flex;gap:14px;align-items:stretch;border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:14px;}
  .pcard{flex:0 0 46%;max-width:46%;}
  .pitem-no{font-size:13px;font-weight:700;color:#555;margin-bottom:5px;}
  .pcard .pamt{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
  .pcard .pcur{font-size:12px;color:#666;margin-top:1px;}
  .pcard .pstatus{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:999px;background:#f0ede6;color:#7a3b22;margin:6px 0 10px;}
  .pkv{width:100%;border-collapse:collapse;font-size:12.5px;}
  .pkv td{padding:5px 0;border-top:1px solid #eee;vertical-align:top;}
  .pkv tr:first-child td{border-top:none;}
  .pkv td:first-child{color:#888;width:32%;}
  .pkv td:last-child{font-weight:600;text-align:right;}
  .pproof{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;}
  .pproof img{width:100%;max-height:90mm;object-fit:contain;object-position:top;border:1px solid #ddd;border-radius:6px;}
  .pproof-empty{flex:1;min-height:200px;border:1px dashed #ccc;border-radius:6px;}
  .ppdf{font-size:12px;color:#8a887f;font-style:italic;}
  .ptotal{margin-top:16px;font-size:16px;font-weight:700;}
  @media print{
    body{visibility:hidden;}
    .print-host{position:absolute;top:0;left:0;padding:0;overflow:visible;}
    .print-host,.print-host *{visibility:visible;}
    .print-actions{display:none !important;}
    .pitem{break-inside:avoid;page-break-inside:avoid;}
    .pproof img{max-height:90mm;}
  }
  @page{size:A4 portrait;margin:12mm;}

  /* summary card */
  .summary{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
  .summary .srow{display:flex;justify-content:space-between;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line-soft);font-size:14.5px;}
  .summary .srow:last-child{border-bottom:none;}
  .summary .srow .k{color:var(--slate);font-weight:500;}
  .summary .srow .v{font-weight:600;text-align:right;}
  .summary .srow .v.big{font-family:var(--mono);font-size:18px;}

  /* detail */
  .det-amt{text-align:center;padding:22px 0 8px;}
  .det-amt .n{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:40px;font-weight:600;letter-spacing:-.02em;}
  .det-amt .cur{font-size:14px;color:var(--slate);font-weight:600;}
  .status-line{display:flex;justify-content:center;gap:8px;margin:6px 0 20px;}
  .status-tag{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:700;}
  .status-tag.st-unclaimed-c{background:#eef1f4;color:var(--slate);}
  .status-tag.st-submitted-c{background:#fdf0e0;color:var(--amber);}
  .status-tag.st-reimbursed-c{background:#e6f4ea;color:var(--green);}
  /* shared status colours (used by status-tag and mini-tag) */
  .st-unclaimed-c{background:#eef1f4;color:var(--slate);}
  .st-submitted-c{background:#fdf0e0;color:var(--amber);}
  .st-reimbursed-c{background:#e6f4ea;color:var(--green);}
  .st-rejected-c{background:#fbe9e6;color:var(--danger);}

  .kv{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:16px;overflow:hidden;}
  .kv .r{display:flex;justify-content:space-between;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line-soft);font-size:14.5px;}
  .kv .r:last-child{border-bottom:none;}
  .kv .r .k{color:var(--slate);}
  .kv .r .v{font-weight:600;text-align:right;max-width:62%;}
  .edit-log{font-size:12.5px;color:var(--slate);}
  .edit-log .e{padding:7px 0;border-bottom:1px solid var(--line-soft);}
  .edit-log .e:last-child{border:none;}

  .section-label{font-size:13px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--ink-soft);margin:16px 4px 8px;}

  /* claim */
  .claim-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
  .claim-row .cbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;}
  .claim-row.sel .cbox{background:var(--jade);border-color:var(--jade);}
  .claim-row .info{flex:1;min-width:0;}
  .claim-row .info .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .claim-row .info .s{font-size:12.5px;color:var(--slate);margin-top:2px;}
  .claim-row .a{font-family:var(--mono);font-weight:600;text-align:right;}
  .totbar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--line);padding:14px;margin:0 -14px;}
  .tot-figs{display:flex;flex-wrap:wrap;gap:4px 18px;margin-bottom:10px;}
  .tot-figs .tf{font-family:var(--mono);font-weight:600;font-size:18px;}
  .warn{background:#fdf0e0;color:var(--amber);border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;margin-bottom:10px;}

<script>
"use strict";
/* ============================================================
   Claims — personal multi-company expense tracker
   Local-first: all data in IndexedDB on this device.
   ============================================================ */

/* ---------- constants ---------- */
const CURRENCIES = ["THB","RMB","USD"];
const CUR_SYM = {THB:"฿", RMB:"¥", USD:"$"};
const STATUS_LABEL = {unclaimed:"Unclaimed", submitted:"Submitted", reimbursed:"Reimbursed"};
// Company dot colours — deliberately NOT the status colours (grey/amber/green/red), so a
// company dot is never mistaken for a status. Blue / purple / teal / pink family.
const COMPANY_PALETTE = ["#3f74c9","#7a5bd0","#1f9d8f","#cf5f93","#2b9fd6","#9a55b8","#556fb5","#c65f7a"];
function companyColor(id){const c=state.companies.find(x=>x.id===id);return (c&&c.color)||"#b4b2a9";}
// THB claim value of an entry. THB entries use their own amount; foreign entries use the
// manually-entered claim_thb_minor (null until filled from the card statement).
function claimThb(e){ return e.currency==="THB" ? e.amount_minor : (e.claim_thb_minor!=null ? e.claim_thb_minor : null); }
function travelFuelMinor(distance,rate){return Math.round(Math.round(Number(distance||0)*10)*rate/10);}
function normalizeTravel(e){if(e.type!=="travel")return e;const legacy=e.travel_distance_km==null&&e.travel_fuel_rate_minor==null;return {...e,travel_destination:e.travel_destination??e.location_label??"",travel_distance_km:e.travel_distance_km??null,travel_fuel_rate_minor:e.travel_fuel_rate_minor??null,travel_fuel_minor:e.travel_fuel_minor??(legacy?0:travelFuelMinor(e.travel_distance_km,e.travel_fuel_rate_minor)),travel_toll_minor:e.travel_toll_minor??e.amount_minor??0,travel_total_minor:e.travel_total_minor??e.amount_minor??0,travel_preset_id:e.travel_preset_id??null,travel_legacy:legacy};}
function applyDestination(d,p){d.travel_preset_id=p?.id||null;d.travel_destination=p?.name||"";d.location_label=d.travel_destination;d.location_lat=p?.lat??null;d.location_lng=p?.lng??null;d.travel_distance_km=p?.distance_km??null;d.travel_fuel_rate_minor=p?.fuel_rate_minor??state.fuelRateMinor;d.travel_toll_minor=p?.toll_minor??0;recalcTravel(d);}
function recalcTravel(d){d.travel_fuel_minor=travelFuelMinor(d.travel_distance_km,d.travel_fuel_rate_minor);d.travel_total_minor=d.travel_fuel_minor+(Number.isSafeInteger(d.travel_toll_minor)?d.travel_toll_minor:0);d.amount_minor=d.travel_total_minor;d.amount_str=(d.amount_minor/100).toFixed(2);d.currency="THB";}
// Short code used as the claim-ID prefix (e.g. "TOTEM"). Auto-derived from the name but editable.
function codeFromName(name){ return ((name||"").toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6)) || "CO"; }
// Human-readable claim ID: CODE-YEAR-NNN, with a persistent per-company-per-year counter in meta.
async function nextClaimNo(companyId, year){
  year = year || new Date().getFullYear();
  const comp=state.companies.find(c=>c.id===companyId);
  const code=(comp&&comp.code)||codeFromName(comp&&comp.name);
  const key=`claimseq:${companyId}:${year}`;
  const cur=(await DB.get("meta",key))?.v||0;
  const next=cur+1;
  await DB.put("meta",{k:key,v:next});
  return `${code}-${year}-${String(next).padStart(3,"0")}`;
}
// One-time backfill: give existing batches a claim_no, oldest first, using each batch's own year.
async function migrateClaimIds(){
  await DB.runTransaction(["companies","meta","batches"],"readwrite",async(s,t,req)=>{
    const all=await req(s.batches.getAll()),missing=all.filter(b=>!b.claim_no).sort((a,b)=>(a.created_at||0)-(b.created_at||0));
    if(!missing.length)return;
    const counters=new Map();
    for(const b of all){if(!b.claim_no)continue;const m=String(b.claim_no).match(/-(\d{4})-(\d+)$/);if(m){const k=`${b.company_id}:${m[1]}`;counters.set(k,Math.max(counters.get(k)||0,+m[2]));}}
    for(const b of missing){const company=await req(s.companies.get(b.company_id));if(!company)throw new Error("Cannot migrate a claim with a missing company");const year=new Date(b.created_at||Date.now()).getFullYear(),key=`claimseq:${b.company_id}:${year}`,mk=`${b.company_id}:${year}`,meta=await req(s.meta.get(key));const next=Math.max(counters.get(mk)||0,Number.isSafeInteger(meta?.v)?meta.v:0)+1;const code=(company.code||codeFromName(company.name)).toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6)||"CO";b.claim_no=`${code}-${year}-${String(next).padStart(3,"0")}`;await req(s.meta.put({k:key,v:next}));await req(s.batches.put(b));counters.set(mk,next);}
  });
}

/* ---------- tiny DOM helpers ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const uid = ()=> (Date.now().toString(36)+Math.random().toString(36).slice(2,9));
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function money(minor,cur){const v=(minor/100);return CUR_SYM[cur]+v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function todayISO(){const d=new Date();const o=d.getTimezoneOffset();return new Date(d-o*60000).toISOString().slice(0,10);}
const MONTHS_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(iso){if(!iso)return"";const [y,m,d]=iso.split("-");return `${+d} ${MONTHS_ABBR[+m-1]||""} ${y}`;}
const fmtDateShort = fmtDate;
function fmtDateText(iso){if(!iso)return"Pick a date";return fmtDate(iso);}

function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}

// Records that data changed just now, so the backup-reminder banner can rely on it even when
// the change (e.g. a deletion) leaves no updated_at/created_at timestamp behind to scan for.
async function markDataChanged(){
  const now = Date.now();
  await DB.put("meta", {k:"lastChangeAt", v: now});
  state.newestChange = Math.max(state.newestChange || 0, now);
  renderBackupBanner();
}

/* ============================================================
   IndexedDB layer
   ============================================================ */
const DB = (()=>{
  let db=null;
  const NAME="ledger_db", VER=1;
  function open(){
    return new Promise((res,rej)=>{
      const rq=indexedDB.open(NAME,VER);
      rq.onupgradeneeded=e=>{
        const d=e.target.result;
        if(!d.objectStoreNames.contains("companies")) d.createObjectStore("companies",{keyPath:"id"});
        if(!d.objectStoreNames.contains("entries")){
          const s=d.createObjectStore("entries",{keyPath:"id"});
          s.createIndex("company_id","company_id");
          s.createIndex("status","status");
          s.createIndex("payment_date","payment_date");
        }
        if(!d.objectStoreNames.contains("tags")) d.createObjectStore("tags",{keyPath:"name"});
        if(!d.objectStoreNames.contains("proofs")){
          const s=d.createObjectStore("proofs",{keyPath:"id"});
          s.createIndex("entry_id","entry_id");
        }
        if(!d.objectStoreNames.contains("batches")) d.createObjectStore("batches",{keyPath:"id"});
        if(!d.objectStoreNames.contains("batch_entries")){
          const s=d.createObjectStore("batch_entries",{keyPath:"id"});
          s.createIndex("batch_id","batch_id");
          s.createIndex("entry_id","entry_id");
        }
        if(!d.objectStoreNames.contains("edits")){
          const s=d.createObjectStore("edits",{keyPath:"id"});
          s.createIndex("entry_id","entry_id");
        }
        if(!d.objectStoreNames.contains("meta")) d.createObjectStore("meta",{keyPath:"k"});
      };
      rq.onsuccess=e=>{db=e.target.result;res(db);};
      rq.onerror=e=>rej(e.target.error);
    });
  }
  function tx(stores,mode="readonly"){return db.transaction(stores,mode);}
  function reqP(r){return new Promise((res,rej)=>{r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
  function txDone(t){return new Promise((res,rej)=>{t.oncomplete=()=>res();t.onabort=()=>rej(t._appError||t.error||new Error("Transaction aborted"));t.onerror=()=>{};});}
  async function runTransaction(stores,mode,worker){
    const t=tx(stores,mode), handles={};
    (Array.isArray(stores)?stores:[stores]).forEach(n=>handles[n]=t.objectStore(n));
    const done=txDone(t); let result;
    try{ result=await worker(handles,t,reqP); }
    catch(err){ t._appError=err;try{t.abort();}catch(_){} await done.catch(()=>{});throw err; }
    await done; return result;
  }
  function getAll(store,index,query){
    const t=tx(store);const s=t.objectStore(store);
    const src=index?s.index(index):s;
    return reqP(src.getAll(query));
  }
  function get(store,key){return reqP(tx(store).objectStore(store).get(key));}
  function put(store,val){const t=tx(store,"readwrite");t.objectStore(store).put(val);return new Promise((res,rej)=>{t.oncomplete=()=>res(val);t.onerror=()=>rej(t.error);});}
  function del(store,key){const t=tx(store,"readwrite");t.objectStore(store).delete(key);return new Promise((res,rej)=>{t.oncomplete=res;t.onerror=()=>rej(t.error);});}
  function bulkPut(store,vals){const t=tx(store,"readwrite");const s=t.objectStore(store);vals.forEach(v=>s.put(v));return new Promise((res,rej)=>{t.oncomplete=res;t.onerror=()=>rej(t.error);});}
  return {open,getAll,get,put,del,bulkPut,runTransaction,reqP,raw:()=>db,
    getByIndex:(store,index,val)=>getAll(store,index,IDBKeyRange.only(val))};
})();

/* ============================================================
   App state
   ============================================================ */
const state = {
  tab:"home",
  companies:[],
  entries:[],
  filter:{company:null, status:null, from:null, to:null, q:"", tags:[]},
  defaultCurrency:"THB",
  fuelRateMinor:450,
  destinations:[],
  batchFilter:"active",
  activeClaimIds:new Map(),
  activeClaimIntegrity:new Set(),
};

async function loadAll(){
  state.companies = (await DB.getAll("companies")).sort((a,b)=>a.name.localeCompare(b.name));
  // Backfill a colour + short code for any company created before they existed (one-time, stable).
  for(let i=0;i<state.companies.length;i++){ const c=state.companies[i]; let dirty=false;
    if(!c.color){ c.color=COMPANY_PALETTE[i%COMPANY_PALETTE.length]; dirty=true; }
    if(!c.code){ c.code=codeFromName(c.name); dirty=true; }
    if(dirty) await DB.put("companies",c); }
  state.entries = (await DB.getAll("entries"));
  const dc = await DB.get("meta","defaultCurrency");
  state.defaultCurrency = dc?.v || "THB";
  const cn = await DB.get("meta","claimantName");
  state.claimantName = cn?.v || "";
  const lb = await DB.get("meta","lastBackupAt");
  state.lastBackupAt = lb?.v || 0;
  const fr=await DB.get("meta","travelFuelRateMinor"),dp=await DB.get("meta","travelDestinations");
  state.fuelRateMinor=Number.isSafeInteger(fr?.v)&&fr.v>=0?fr.v:450;
  state.destinations=Array.isArray(dp?.v)?dp.v.map(x=>({...x})):[];
  const batches=await DB.getAll("batches"),batchEntries=await DB.getAll("batch_entries"),batchById=new Map(batches.map(b=>[b.id,b])),activeClaims=new Map(),integrity=new Set();
  for(const be of batchEntries){const batch=batchById.get(be.batch_id);if(!batch||batch.status==="cancelled"||!(be.outcome==="pending"||be.outcome==="reimbursed"))continue;if(activeClaims.has(be.entry_id)){activeClaims.delete(be.entry_id);integrity.add(be.entry_id);console.error("Entry belongs to more than one active claim",be.entry_id);}else if(!integrity.has(be.entry_id))activeClaims.set(be.entry_id,batch.claim_no||"Claim");}
  state.activeClaimIds=activeClaims;state.activeClaimIntegrity=integrity;
  // Work out whether anything changed since the last backup (for the reminder banner).
  let newest=0;
  state.entries.forEach(e=>{ newest=Math.max(newest, e.updated_at||0, e.created_at||0); });
  state.companies.forEach(c=>{ newest=Math.max(newest, c.created_at||0); });
  batches.forEach(b=>{ newest=Math.max(newest, b.created_at||0, b.reimbursed_at||0, b.cancelled_at||0); });
  batchEntries.forEach(be=>{ newest=Math.max(newest, be.outcome_updated_at||0, be.synced_at||0); });
  const lc = await DB.get("meta","lastChangeAt");
  state.newestChange = Math.max(newest, lc?.v || 0);
  state.hasData = state.entries.length>0 || state.companies.length>0;
}

function timeAgo(ts){
  if(!ts) return "";
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return "just now";
  const m=Math.floor(s/60); if(m<60) return m+" min ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  const d=Math.floor(h/24); return d+" day"+(d>1?"s":"")+" ago";
}
function backupIsDue(){ return !!(state.hasData && (state.newestChange||0) > (state.lastBackupAt||0)); }
function renderBackupBanner(){
  const el=$("#backupBanner"); if(!el) return;
  if(!backupIsDue()){ el.style.display="none"; el.innerHTML=""; return; }
  const when = state.lastBackupAt ? `since your last backup ${timeAgo(state.lastBackupAt)}` : "and you haven’t backed up yet";
  el.style.display="block";
  el.innerHTML=`<div class="bkp-inner"><span>⚠ You have changes ${when} — keep a copy off this phone.</span><button id="bkpNow">Back up</button></div>`;

function filteredEntries(){
  const c=state.filter;
  let list=state.entries.slice();
  if(c.company) list=list.filter(e=>e.company_id===c.company);
  if(c.status) list=list.filter(e=>e.status===c.status);
  if(c.from) list=list.filter(e=>e.payment_date>=c.from);
  if(c.to) list=list.filter(e=>e.payment_date<=c.to);
  if(Array.isArray(c.tags)&&c.tags.length)list=list.filter(e=>(e.tags||[]).some(t=>c.tags.includes(t)));
  if(c.q){ const q=c.q.toLowerCase(); list=list.filter(e=>
    (e.vendor||"").toLowerCase().includes(q) ||
    (e.notes||"").toLowerCase().includes(q) ||
    (e.location_label||"").toLowerCase().includes(q) ||
    companyName(e.company_id).toLowerCase().includes(q) ||
    (e.tags||[]).some(t=>t.toLowerCase().includes(q))
  ); }
  list.sort((a,b)=> b.payment_date.localeCompare(a.payment_date) || b.created_at-a.created_at );

}

async function renderLog(){
  const list=filteredEntries();
  const log=$("#log");
  if(list.length===0){
    const anyEntries=state.entries.length>0;
    log.innerHTML=`<div class="empty"><h3>${anyEntries?"No matches":"No entries yet"}</h3><p>${anyEntries?"Try clearing a filter.":"Tap + to log your first expense."}</p></div>`;
    return;
  }
  const allProofs=await DB.getAll("proofs");
  const pc={};allProofs.forEach(p=>pc[p.entry_id]=(pc[p.entry_id]||0)+1);
  let html="", lastDay=null, open=false, firstInGroup=false;
  for(const e of list){
    if(e.payment_date!==lastDay){
      if(open) html+=`</div>`;                 // close previous day-group
      lastDay=e.payment_date;
      html+=`<div class="day-head">${fmtDate(e.payment_date)}</div><div class="day-group">`;
      open=true; firstInGroup=true;
    }
    if(!firstInGroup) html+=`<div class="row-div"></div>`;  // inset divider between same-day rows
    firstInGroup=false;
    html+=logRowHTML(e, !pc[e.id]);
  }
  if(open) html+=`</div>`;
  log.innerHTML=html;
}

// Company to pre-select for a new entry: the one used on the most recent
// entry (falls back to the first company if there are no entries yet).
function lastUsedCompanyId(){
  const ids=new Set(state.companies.map(c=>c.id));
  let best=null,bestT=-Infinity;
  (state.entries||[]).forEach(e=>{const t=e.created_at||0; if(t>bestT && ids.has(e.company_id)){bestT=t;best=e.company_id;}});
  return best || state.companies[0]?.id || null;
}
function newDraft(){
  return {id:uid(), company_id:lastUsedCompanyId(), type:"expense",

    status:"unclaimed", _proofs:[], _isNew:true};
}

async function openAddEntry(existing){
  if(existing){

    if(!current){toast("This entry no longer exists");return;}
    if(current.status!=="unclaimed"){toast("This entry is in a claim — cancel or undo the claim to edit it");return;}

  }

async function saveEntry(isEdit){
  const d=draft;
  const now=Date.now();
  const editBase=isEdit?state.entries.find(e=>e.id===d.id):null;
  let changes=null;
  if(isEdit){
    const before=state.entries.find(e=>e.id===d.id);
    changes={};
    const fields=["amount_minor","currency","claim_thb_minor","vendor","payment_date","notes","company_id","type","location_label","travel_destination","travel_distance_km","travel_fuel_rate_minor","travel_fuel_minor","travel_toll_minor","travel_total_minor","travel_preset_id","location_lat","location_lng"];
    fields.forEach(f=>{ if((before[f]??"")!==(d[f]??"")) changes[f]=[before[f],d[f]]; });
    if(JSON.stringify((before.tags||[]).sort())!==JSON.stringify([...d.tags].sort())) changes.tags=[before.tags||[],d.tags];
  }
  const claimRaw = (d.claim_thb_str||"").replace(/,/g,"").trim();
  const claim_thb_minor = (d.currency!=="THB" && claimRaw!=="" && !isNaN(parseFloat(claimRaw)))
    ? Math.round(parseFloat(claimRaw)*100) : null;
  const rec={
    id:d.id, company_id:d.company_id, type:d.type,
    amount_minor:d.amount_minor, currency:d.currency, claim_thb_minor,
    vendor:d.vendor, payment_date:d.payment_date, notes:d.notes, tags:d.tags,
    location_lat:d.location_lat, location_lng:d.location_lng, location_label:d.location_label,
    travel_destination:d.type==="travel"?d.travel_destination||d.location_label||"":"",travel_distance_km:d.type==="travel"?d.travel_distance_km:null,travel_fuel_rate_minor:d.type==="travel"?d.travel_fuel_rate_minor:null,travel_fuel_minor:d.type==="travel"?d.travel_fuel_minor:null,travel_toll_minor:d.type==="travel"?d.travel_toll_minor:null,travel_total_minor:d.type==="travel"?d.travel_total_minor:null,travel_preset_id:d.type==="travel"?d.travel_preset_id:null,
    status:d.status||"unclaimed",
    created_at:d._isNew?now:(state.entries.find(e=>e.id===d.id)?.created_at||now),
    updated_at:now,
  };
  if(isEdit){
    await DB.runTransaction(["entries"],"readwrite",async(s,t,req)=>{const current=await req(s.entries.get(rec.id));if(!current)throw lifecycleError("This entry no longer exists");if(current.status!=="unclaimed")throw lifecycleError("This entry is in a claim — cancel or undo the claim to edit it");if(current.updated_at!==(editBase?.updated_at??current.updated_at))throw lifecycleError("This entry changed in another tab — reopen it and try again");rec.status=current.status;rec.created_at=current.created_at||rec.created_at;await req(s.entries.put(rec));});
  }else await DB.put("entries",rec);

  // proofs: delete removed existing, add new
  const existingProofs=await DB.getByIndex("proofs","entry_id",d.id);
  const keepIds=new Set(d._proofs.filter(p=>p._existing).map(p=>p.id));
  for(const p of existingProofs){ if(!keepIds.has(p.id)) await DB.del("proofs",p.id); }
  for(const p of d._proofs){ if(!p._existing){ await DB.put("proofs",{id:p.id,entry_id:d.id,blob:p.blob,file_type:p.file_type,name:p.name,added_at:now}); } }

  // edit log
  if(isEdit && changes && Object.keys(changes).length){
    const reason = await askEditReason();
    await DB.put("edits",{id:uid(),entry_id:d.id,edited_at:now,changes,reason:reason||null});
  }

  await loadAll();
  await markDataChanged();
  refreshCurrent();
}

function askEditReason(){
  return new Promise(res=>{
    openSheet(`<h3>What changed? <span style="font-weight:400;color:var(--slate);font-size:14px;">(optional)</span></h3>
      <div class="field"><input type="text" id="reasonInput" placeholder="e.g. corrected amount from receipt"></div>
      <button class="btn btn-primary" id="reasonSave">Save</button>
      <button class="btn btn-ghost" id="reasonSkip" style="margin-top:10px;">Skip</button>`);
    $("#reasonSave").addEventListener("click",()=>{const v=$("#reasonInput").value.trim();closeSheet();res(v);});
    $("#reasonSkip").addEventListener("click",()=>{closeSheet();res("");});
  });
}

function confirmDelete(id,screen){
  openSheet(`<h3>Delete this entry?</h3><p class="hint" style="margin-bottom:16px;">This removes the entry and its proof files from this device. It can't be undone.</p>
    <button class="btn btn-danger" id="delYes">Delete</button>
    <button class="btn btn-ghost" id="delNo" style="margin-top:10px;">Cancel</button>`);

}

function wireCompactForm(screen,isEdit){

    const isTravel=d.type==="travel";

  const tagFreq={}, tagLastUsed={};
  (state.entries||[]).forEach(e=>{ const t=e.created_at||0; (e.tags||[]).forEach(tag=>{ tagFreq[tag]=(tagFreq[tag]||0)+1; tagLastUsed[tag]=Math.max(tagLastUsed[tag]||0,t); }); });
  let tagSort="used";
  function tagsSorted(query){
    let list=Array.from(new Set(cfTags));
    if(query){ const ql=query.toLowerCase(); list=list.filter(t=>t.toLowerCase().includes(ql)); }
    if(tagSort==="alpha") list.sort((a,b)=>a.localeCompare(b));
    else if(tagSort==="recent") list.sort((a,b)=>((tagLastUsed[b]||0)-(tagLastUsed[a]||0))||a.localeCompare(b));

    return list;
  }
  function renderTags(){ // shows the chosen tags in the form + opens the picker

    $$("#cTagsSelected .tag",screen).forEach(b=>b.addEventListener("click",()=>{ d.tags=d.tags.filter(x=>x!==b.dataset.tag); renderTags(); }));

    }else{
      Object.assign(d,d._expenseDraft);d.location_lat=null;d.location_lng=null;d.location_label="";q("#cAmount").value=d.amount_str||"";q("#cCur").value=d.currency;q("#cClaimThb").value=d.claim_thb_str||"";q("#cVendor").value=d.vendor||"";q("#cNotes").value=d.notes||"";renderTags();syncClaimThb();

  function readTravelCalc(){d.travel_destination=q("#cTravelName").value.trim();d.location_label=d.travel_destination;d.travel_distance_km=q("#cDistance").value===""?null:Math.round(Number(q("#cDistance").value)*10)/10;d.travel_fuel_rate_minor=q("#cFuelRate").value===""?null:Math.round(Number(q("#cFuelRate").value)*100);d.travel_toll_minor=Math.max(0,Math.round(Number(q("#cToll").value||0)*100));recalcTravel(d);q("#cFuelAmount").textContent=money(d.travel_fuel_minor,"THB");q("#cTravelTotal").textContent=money(d.travel_total_minor,"THB");}
  q("#cDestination").addEventListener("change",e=>{const p=state.destinations.find(x=>x.id===e.target.value);if(p){applyDestination(d,p);q("#cTravelName").value=d.travel_destination;q("#cDistance").value=d.travel_distance_km??"";q("#cFuelRate").value=(d.travel_fuel_rate_minor/100).toFixed(2);q("#cToll").value=(d.travel_toll_minor/100).toFixed(2);q("#cPinTxt").textContent=d.location_lat!=null?"Pinned":"Use current location";readTravelCalc();}else d.travel_preset_id=null;});
  ["#cDistance","#cFuelRate","#cToll"].forEach(sel=>q(sel).addEventListener("input",readTravelCalc));

  q("#cPin").addEventListener("click",()=>{if(!navigator.geolocation){toast("Geolocation not available");return;}q("#cPinTxt").textContent="Locating\u2026";navigator.geolocation.getCurrentPosition(pos=>{d.location_lat=pos.coords.latitude;d.location_lng=pos.coords.longitude;q("#cPinTxt").textContent="Pinned";toast("Location pinned");},()=>{q("#cPinTxt").textContent="Pin location";toast("Location permission denied");},{enableHighAccuracy:true,timeout:10000});});
  q("#cClearPin").addEventListener("click",()=>{d.location_lat=null;d.location_lng=null;q("#cPinTxt").textContent="Use current location";});

async function openDetail(id){
  const found=state.entries.find(x=>x.id===id);if(!found)return;const e=normalizeTravel(found);
  const proofs=await DB.getByIndex("proofs","entry_id",id);
  const edits=(await DB.getByIndex("edits","entry_id",id)).sort((a,b)=>b.edited_at-a.edited_at);
  const bes=await DB.getByIndex("batch_entries","entry_id",id);
  const batchById=new Map((await DB.getAll("batches")).map(b=>[b.id,b]));
  const activeMemberships=bes.filter(be=>{const batch=batchById.get(be.batch_id);return !!batch&&batch.status!=="cancelled"&&(be.outcome==="pending"||be.outcome==="reimbursed");});
  const activeBe=activeMemberships.length===1?activeMemberships[0]:null;
  const membershipConflict=activeMemberships.length>1;
  if(membershipConflict)console.error("Entry belongs to more than one active claim",id,activeMemberships.map(be=>be.batch_id));

  const kv=[
    ["Company",companyName(e.company_id)],
    ["Type",e.type[0].toUpperCase()+e.type.slice(1)],
    e.vendor?["Vendor",e.vendor]:null,
    ["Date",fmtDate(e.payment_date)],
    e.type==="travel"?["Destination",e.travel_destination||e.location_label||"—"]:null,
    e.type==="travel"?["Total distance",e.travel_distance_km==null?"—":`${e.travel_distance_km} km`]:null,
    e.type==="travel"?["Fuel rate",e.travel_fuel_rate_minor==null?"—":`${money(e.travel_fuel_rate_minor,"THB")}/km`]:null,
    e.type==="travel"?["Fuel amount",e.travel_fuel_minor==null?"—":money(e.travel_fuel_minor,"THB")]:null,
    e.type==="travel"?["Toll",e.travel_toll_minor==null?"—":money(e.travel_toll_minor,"THB")]:null,
    e.type==="travel"?["Total amount",money(e.travel_total_minor??e.amount_minor,"THB")]:null,
    e.type==="travel"&&e.location_lat!=null?["Map pin",`${e.location_lat.toFixed(4)}, ${e.location_lng.toFixed(4)}`]:null,
    e.tags&&e.tags.length?["Tags",e.tags.join(", ")]:null,
    e.notes?["Notes",e.notes]:null,
  ].filter(Boolean);

  const proofHTML = proofs.length? `<div class="proofs">${proofs.map(p=>{
      const isImg=p.file_type&&p.file_type.startsWith("image");
      const url=URL.createObjectURL(p.blob);
      return `<a class="proof-thumb" href="${url}" target="_blank" rel="noopener">${isImg?`<img src="${url}">`:`<span class="pdf">PDF</span>`}</a>`;
    }).join("")}</div>`
    : `<div class="warn">No payment proof attached.</div>`;

  const statusClass={unclaimed:"st-unclaimed-c",submitted:"st-submitted-c",reimbursed:"st-reimbursed-c"}[e.status];

  const body=`
    <div class="det-amt">
      <span class="n">${e.type==='travel'&&e.amount_minor===0?'—':money(e.amount_minor,e.currency)}</span>
      <div class="cur">${e.type==='travel'?'Travel':e.currency}</div>
    </div>
    <div class="status-line"><span class="status-tag ${statusClass}">${STATUS_LABEL[e.status]}</span></div>

    <div class="kv">${kv.map(r=>`<div class="r"><span class="k">${esc(r[0])}</span><span class="v">${esc(r[1])}</span></div>`).join("")}</div>

    <div class="section-label">Payment proof</div>
    ${proofHTML}

    ${(e.type==='travel'&&e.location_lat!=null)?`<a class="btn btn-ghost" href="https://www.google.com/maps?q=${e.location_lat},${e.location_lng}" target="_blank" rel="noopener" style="margin-top:12px;">View location on map</a>`:""}

    ${e.status==="unclaimed"?`<button class="btn btn-ghost" id="editBtn" style="margin-top:22px;">Edit entry</button>`:""}
    <button class="btn btn-ghost" id="dupBtn" style="margin-top:10px;">Duplicate as new entry</button>
    ${activeBe?`<div class="hint" style="margin-top:16px;">This entry can’t be edited or deleted while it belongs to this claim. Cancel the claim or undo reimbursement first, or use Duplicate as new entry.</div>
    <button class="btn btn-ghost" id="goClaimBtn" style="margin-top:10px;">View claim</button>`:""}
    ${membershipConflict?`<div class="warn" style="margin-top:16px;">⚠ This entry has multiple active claim memberships. No claim link is shown until the integrity issue is resolved.</div>`:""}

    ${e.status==="unclaimed"?`<button class="btn btn-danger" id="delBtn" style="margin-top:10px;">Delete entry</button>`:""}

    ${edits.length?`<div class="section-label">Edit history</div>
      <div class="kv" style="padding:4px 15px;"><div class="edit-log">
        ${edits.map(ed=>`<div class="e"><strong>${fmtDateTime(ed.edited_at)}</strong> — ${esc(summarizeChanges(ed.changes))}${ed.reason?`<br><em>“${esc(ed.reason)}”</em>`:""}</div>`).join("")}
      </div></div>`:""}
  `;
  const sc=openScreen("Entry", body, e.status==="unclaimed"?`<button id="detEdit">Edit</button>`:"");
  const goEdit=async()=>{ await openAddEntry(e); };
  sc.querySelector("#detEdit")?.addEventListener("click",goEdit);
  sc.querySelector("#editBtn")?.addEventListener("click",goEdit);
  sc.querySelector("#dupBtn").addEventListener("click",()=>duplicateEntry(e));
  sc.querySelector("#delBtn")?.addEventListener("click",()=>confirmDelete(e.id,sc));
  sc.querySelector("#goClaimBtn")?.addEventListener("click",()=>{ closeTopScreen(); setTimeout(()=>openBatchDetail(activeBe.batch_id),260); });
}

function fmtDateTime(ts){const d=new Date(ts);const dd=String(d.getDate()).padStart(2,"0");const mm=String(d.getMonth()+1).padStart(2,"0");return `${dd}/${mm}/${d.getFullYear()}, `+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});}
function summarizeChanges(ch){
  const names={amount_minor:"amount",currency:"currency",vendor:"vendor",payment_date:"date",notes:"notes",company_id:"company",type:"type",location_label:"location",tags:"tags",travel_destination:"destination",travel_distance_km:"total distance",travel_fuel_rate_minor:"fuel rate",travel_fuel_minor:"fuel amount",travel_toll_minor:"toll",travel_total_minor:"total amount",location_lat:"map pin",location_lng:"map pin"};
  return Object.keys(ch).map(k=>{
    if(k==="amount_minor")return `amount → changed`;
    if(k==="company_id")return `company → changed`;
    if(k==="tags")return `tags → changed`;
    return `${names[k]||k} → changed`;
  }).join(", ");
}

/* ============================================================
   CLAIM builder
   ============================================================ */
const claimState={company:null, from:null, to:null, showAll:false, claimName:"", selected:new Set()};

function openClaim(){
  if(state.companies.length===0){toast("Add a company first");openCompanies(true);return;}
  claimState.company=claimState.company||state.companies[0].id;
  claimState.from=claimState.from||firstOfMonth();
  claimState.to=claimState.to||todayISO();
  claimState.selected=new Set();
  renderClaim();
}
function firstOfMonth(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;}

function claimCandidates(){
  return state.entries.filter(e=>
    e.company_id===claimState.company &&
    e.payment_date>=claimState.from && e.payment_date<=claimState.to &&
    (claimState.showAll || e.status==="unclaimed")
  ).sort((a,b)=>a.payment_date.localeCompare(b.payment_date));
}

async function renderClaim(){
  const list=claimCandidates();
  // default select all unclaimed candidates
  if(claimState.selected.size===0){ list.forEach(e=>{ if(e.status==="unclaimed") claimState.selected.add(e.id); }); }

  const allProofs=await DB.getAll("proofs");
  const pc={};allProofs.forEach(p=>pc[p.entry_id]=1);

  const rows=list.map(e=>{
    const sel=claimState.selected.has(e.id);
    const noProof=!pc[e.id];
    return `<div class="claim-row ${sel?'sel':''}" data-id="${esc(e.id)}">
      <div class="cbox">${sel?'✓':''}</div>
      <div class="info">
        <div class="t">${esc(entryDisplayName(e))} ${noProof?'<span class="noproof">⚠</span>':''}</div>
        <div class="s">${fmtDateShort(e.payment_date)} · ${STATUS_LABEL[e.status]}${e.status!=="unclaimed"?" (already)":""}</div>
      </div>
      <div class="a">${amountMainHTML(e)}</div>
    </div>`;
  }).join("");

  // totals for selected — THB claim values roll into THB; foreign items without a THB amount
  // are flagged and shown in native currency.
  const tot={};let noProofCount=0, needThbCount=0;
  list.forEach(e=>{if(claimState.selected.has(e.id)){
    const thb=claimThb(e);
    if(thb!=null){ tot["THB"]=(tot["THB"]||0)+thb; }
    else { needThbCount++; tot[e.currency]=(tot[e.currency]||0)+e.amount_minor; }
    if(!pc[e.id])noProofCount++;
  }});
  const totKeys=Object.keys(tot);
  const selCount=claimState.selected.size;

  const body=`
    <div class="field"><label>Company</label>

function validISODate(v){if(!/^\d{4}-\d{2}-\d{2}$/.test(v||""))return false;const d=new Date(v+"T00:00:00Z");return !isNaN(d)&&d.toISOString().slice(0,10)===v;}
function claimError(message,entryId){const e=new Error(message);e.code="CLAIM_INVALID";e.entryId=entryId||null;return e;}
function auditFail(step){if(window.__claimsTestFailAt===step)throw new Error(`Injected failure: ${step}`);}
function snapshotFromEntry(e,company){
  e=normalizeTravel(e);
  const thb=e.currency==="THB"?e.amount_minor:e.claim_thb_minor;
  return {amount_minor_snapshot:thb,currency_snapshot:"THB",original_amount_minor:e.amount_minor,original_currency:e.currency,
    company_id_snapshot:e.company_id,vendor_snapshot:e.vendor||company?.name||"",date_snapshot:e.payment_date,type_snapshot:e.type,
    notes_snapshot:e.notes||"",tags_snapshot:[...(e.tags||[])],location_label_snapshot:e.location_label||"",
    location_lat_snapshot:e.location_lat??null,location_lng_snapshot:e.location_lng??null,
    travel_destination_snapshot:e.type==="travel"?e.travel_destination||e.location_label||"":null,travel_distance_km_snapshot:e.type==="travel"?e.travel_distance_km:null,travel_fuel_rate_minor_snapshot:e.type==="travel"?e.travel_fuel_rate_minor:null,travel_fuel_minor_snapshot:e.type==="travel"?e.travel_fuel_minor:null,travel_toll_minor_snapshot:e.type==="travel"?e.travel_toll_minor:null,travel_total_minor_snapshot:e.type==="travel"?e.travel_total_minor??e.amount_minor:null,travel_preset_id_snapshot:e.type==="travel"?e.travel_preset_id:null};
}
function snapshotComparison(entry,be,company){
  const current=snapshotFromEntry(entry,company),changed=[];
  const eq=(a,b)=>Object.is(a,b),tags=v=>JSON.stringify([...(v||[])].sort((a,b)=>String(a).localeCompare(String(b))));
  const checks=[
    ["Claim amount",be.amount_minor_snapshot,current.amount_minor_snapshot,eq],
    ["Claim currency",be.currency_snapshot,current.currency_snapshot,eq],
    ["Original amount",be.original_amount_minor,current.original_amount_minor,eq],
    ["Original currency",be.original_currency,current.original_currency,eq],
    ["Company",be.company_id_snapshot??entry.company_id,current.company_id_snapshot,eq],
    [entry.type==="travel"?"Location":"Vendor",be.vendor_snapshot,current.vendor_snapshot,eq],
    ["Payment date",be.date_snapshot,current.date_snapshot,eq],
    ["Type",be.type_snapshot,current.type_snapshot,eq],
    ["Notes",be.notes_snapshot,current.notes_snapshot,eq],
    ["Tags",be.tags_snapshot,current.tags_snapshot,(a,b)=>tags(a)===tags(b)],
    ["Travel location",be.location_label_snapshot,current.location_label_snapshot,eq],
    ["Travel latitude",be.location_lat_snapshot,current.location_lat_snapshot,eq],
    ["Travel longitude",be.location_lng_snapshot,current.location_lng_snapshot,eq],
    ["Travel destination",be.travel_destination_snapshot,current.travel_destination_snapshot,eq],
    ["Travel total distance",be.travel_distance_km_snapshot,current.travel_distance_km_snapshot,eq],
    ["Travel fuel rate",be.travel_fuel_rate_minor_snapshot,current.travel_fuel_rate_minor_snapshot,eq],
    ["Travel fuel amount",be.travel_fuel_minor_snapshot,current.travel_fuel_minor_snapshot,eq],
    ["Travel toll",be.travel_toll_minor_snapshot,current.travel_toll_minor_snapshot,eq],
    ["Travel total amount",be.travel_total_minor_snapshot,current.travel_total_minor_snapshot,eq],
  ];
  for(const [label,oldValue,newValue,compare] of checks){if(oldValue!==undefined&&!compare(oldValue,newValue))changed.push(label);}
  return {matches:changed.length===0,changedFields:changed,currentSnapshot:current};
}
function applyCurrentSnapshot(be,snapshot){for(const [k,v] of Object.entries(snapshot))be[k]=Array.isArray(v)?[...v]:v;}
function snapshotToken(snapshot){const x={...snapshot,tags_snapshot:[...(snapshot.tags_snapshot||[])].sort((a,b)=>String(a).localeCompare(String(b)))};return JSON.stringify(x);}
function batchAmounts(items){
  const out={submitted:{},pending:{},reimbursed:{},rejected:{}};
  for(const i of items){const c=i.currency_snapshot,v=i.amount_minor_snapshot;out.submitted[c]=(out.submitted[c]||0)+v;if(out[i.outcome])out[i.outcome][c]=(out[i.outcome][c]||0)+v;}
  return out;
}
function amountLine(byCurrency){const keys=Object.keys(byCurrency);return keys.length?keys.map(c=>money(byCurrency[c],c)).join(" · "):money(0,"THB");}
async function createClaimAtomic(input){
  const ids=[...input.entryIds];
  if(!ids.length)throw claimError("Choose at least one entry");
  if(new Set(ids).size!==ids.length)throw claimError("The claim contains a duplicate entry");
  if(!validISODate(input.rangeStart)||!validISODate(input.rangeEnd)||input.rangeStart>input.rangeEnd)throw claimError("The claim date range is invalid");
  if(!validISODate(input.submittedDate))throw claimError("The submission date is invalid");
  const year=+input.submittedDate.slice(0,4),now=Date.now(),batchId=uid();
  return DB.runTransaction(["companies","meta","batches","batch_entries","entries"],"readwrite",async(s,t,req)=>{
    const normalizedClaimName=input.claimName==null?"":(typeof input.claimName==="string"?input.claimName.trim():null);
    if(normalizedClaimName==null)throw claimError("The claim name must be text");
    if(normalizedClaimName.length>100)throw claimError("The claim name must be 100 characters or fewer");
    const company=await req(s.companies.get(input.companyId));
    if(!company||company.archived)throw claimError("The selected company is unavailable");
    const entries=[];
    for(const id of ids){
      const e=await req(s.entries.get(id));
      if(!e)throw claimError("A selected entry no longer exists",id);
      if(e.status!=="unclaimed")throw claimError("A selected entry is no longer unclaimed",id);
      if(e.company_id!==input.companyId)throw claimError("A selected entry belongs to another company",id);
      if(!["expense","travel"].includes(e.type)||!["THB","RMB","USD"].includes(e.currency))throw claimError("A selected entry has invalid type or currency",id);
      if(!Number.isSafeInteger(e.amount_minor)||e.amount_minor<0)throw claimError("A selected entry has an invalid amount",id);
      if(e.type==="expense"&&e.amount_minor<=0)throw claimError("Expense amounts must be greater than zero",id);
      if(e.type==="travel"&&e.amount_minor===0)throw claimError("Zero-value Travel records cannot be claimed",id);
      if(!validISODate(e.payment_date)||e.payment_date<input.rangeStart||e.payment_date>input.rangeEnd)throw claimError("A selected entry is outside the claim date range",id);
      if(e.currency!=="THB"&&(!Number.isSafeInteger(e.claim_thb_minor)||e.claim_thb_minor<=0))throw claimError("A foreign entry needs a positive THB claim amount",id);
      const memberships=await req(s.batch_entries.index("entry_id").getAll(IDBKeyRange.only(id)));
      for(const be of memberships){
        const membershipBatch=await req(s.batches.get(be.batch_id));
        if(!membershipBatch)throw claimError("A selected entry has a broken claim reference",id);
        if(membershipBatch.status==="cancelled"||be.outcome==="rejected")continue;
        if(be.outcome!=="pending"&&be.outcome!=="reimbursed")throw claimError("A selected entry has an invalid claim history",id);
        throw claimError("A selected entry already belongs to an active claim",id);
      }
      entries.push(e);
    }
    const seqKey=`claimseq:${company.id}:${year}`,seqRec=await req(s.meta.get(seqKey));
    let max=Number.isSafeInteger(seqRec?.v)&&seqRec.v>=0?seqRec.v:0;
    const batches=await req(s.batches.getAll());
    for(const b of batches){if(b.company_id===company.id&&b.claim_no){const m=String(b.claim_no).match(/-(\d{4})-(\d+)$/);if(m&&+m[1]===year&&Number.isSafeInteger(+m[2]))max=Math.max(max,+m[2]);}}
    const sequence=max+1;if(!Number.isSafeInteger(sequence))throw claimError("The claim sequence is too large");
    const code=(company.code||codeFromName(company.name)).toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6)||"CO";
    const claimNo=`${code}-${year}-${String(sequence).padStart(3,"0")}`;
    if(batches.some(b=>b.claim_no===claimNo))throw claimError("That claim number already exists; refresh and try again");
    const batch={id:batchId,company_id:company.id,submitted_date:input.submittedDate,range_start:input.rangeStart,range_end:input.rangeEnd,note:"",claim_name:normalizedClaimName,created_at:now,claim_no:claimNo};
    await req(s.meta.put({k:seqKey,v:sequence}));auditFail("claim-after-counter");await req(s.batches.put(batch));auditFail("claim-after-batch");
    for(const e of entries){
      await req(s.batch_entries.put({id:uid(),batch_id:batchId,entry_id:e.id,...snapshotFromEntry(e,company),outcome:"pending",outcome_updated_at:null}));auditFail("claim-after-batch-entry");
      await req(s.entries.put({...e,status:"submitted",updated_at:now}));auditFail("claim-after-entry");}
    return {batchId,claimNo,sequence,entryCount:entries.length};
  });
}
async function generateBatch(list,screen){
  const btn=screen.querySelector("#genBtn");if(btn?.dataset.busy)return;
  const ids=[...claimState.selected];if(!ids.length)return;
  if(btn){btn.dataset.busy="1";btn.disabled=true;btn.textContent="Creating claim…";}
  try{const result=await createClaimAtomic({companyId:claimState.company,entryIds:ids,rangeStart:claimState.from,rangeEnd:claimState.to,submittedDate:todayISO(),claimName:claimState.claimName});
    await loadAll();await markDataChanged();claimState.selected=new Set();claimState.claimName="";setTab("batches");toast(`Claim created · ${result.entryCount} items marked submitted`);setTimeout(()=>openBatchDetail(result.batchId),300);
  }catch(err){console.error("Claim creation failed",err);toast(err.message||"Claim creation failed — refresh and try again");if(btn){delete btn.dataset.busy;btn.disabled=false;btn.textContent=`Generate claim · ${ids.length} item${ids.length!==1?"s":""}`;}}
}

async function openBatchesTab(){
  const batches=await DB.getAll("batches");
  const bes=await DB.getAll("batch_entries");
  const byBatch={};bes.forEach(be=>{(byBatch[be.batch_id]=byBatch[be.batch_id]||[]).push(be);});

  const activity=b=>b.status==="cancelled"?(b.cancelled_at||b.created_at):(Date.parse(b.submitted_date)||b.created_at),sort=(a,b)=>activity(b)-activity(a)||(b.created_at||0)-(a.created_at||0);
  const active=batches.filter(b=>b.status!=="cancelled").sort(sort),cancelled=batches.filter(b=>b.status==="cancelled").sort(sort);
  const cards=list=>list.map(b=>{
    const items=byBatch[b.id]||[];
    const amounts=batchAmounts(items);
    const pending=items.filter(i=>i.outcome==="pending").length;
    const reimbursed=items.filter(i=>i.outcome==="reimbursed").length;
    const rejected=items.filter(i=>i.outcome==="rejected").length;
    let statusTag,cls;
    if(b.status==="cancelled"){statusTag="Cancelled";cls="st-unclaimed-c";}
    else if(reimbursed>0&&(pending>0||rejected>0)){statusTag="Partly reimbursed";cls="st-submitted-c";}
    else if(pending>0){statusTag="Outstanding";cls="st-submitted-c";}
    else if(reimbursed>0){statusTag="Reimbursed";cls="st-reimbursed-c";}
    else{statusTag="Closed";cls="st-unclaimed-c";}
    const outcome=[pending&&`${pending} pending`,reimbursed&&`${reimbursed} paid`,rejected&&`${rejected} rejected`].filter(Boolean).join(" · ")||"—";
    const claimName=typeof b.claim_name==="string"?b.claim_name.trim():"",companyItems=`${esc(companyName(b.company_id))} · ${items.length} item${items.length!==1?"s":""}`;
    const firstLeft=claimName?`<span class="claim-date">${fmtDateShort(b.submitted_date)} ·</span><span class="claim-name">${esc(claimName)}</span>`:`<span class="claim-date">${fmtDateShort(b.submitted_date)} ·</span><span class="claim-id mono">${esc(b.claim_no||"")}</span>`;
    const secondLeft=claimName?`<span class="claim-id mono">${esc(b.claim_no||"")}</span><span class="batch-company-items"> · ${companyItems}</span>`:companyItems;
    return `<div class="batch-card ${b.status==="cancelled"?"cancelled":""}" data-id="${esc(b.id)}"><div class="batch-card-grid"><div class="left claim-line">${firstLeft}</div><div class="right total">${amountLine(amounts.submitted)}</div><div class="left ${claimName?"batch-ident-line":""}">${secondLeft}</div><div class="right ${cls}">${statusTag}</div><div class="left">${fmtDateShort(b.range_start)} – ${fmtDateShort(b.range_end)}</div><div class="right outcomes">${outcome}</div></div></div>`;
  }).join("");
  let body;
  if(batches.length===0){
    body=`<div class="empty"><h3>No claims yet</h3><p>Build a claim from the Claim tab to submit expenses together.</p></div>`;
  }else{
    const labels={active:"Active claims",cancelled:"Cancelled claims",all:"All claims"},list=state.batchFilter==="active"?active:state.batchFilter==="cancelled"?cancelled:[...batches].sort(sort);
    body=`<button class="chip batch-filter" id="batchFilter">${labels[state.batchFilter]} ▾</button>${list.length?cards(list):`<div class="empty" style="padding:30px 20px;"><h3>No ${labels[state.batchFilter].toLowerCase()}</h3></div>`}`;
  }
  const sc=openScreen("Claims", body);sc.classList.add("batches-screen");
  sc.querySelector("#batchFilter")?.addEventListener("click",()=>chooseSheet("Show claims",[{value:"active",label:"Active claims"},{value:"cancelled",label:"Cancelled claims"},{value:"all",label:"All claims"}],state.batchFilter,v=>{state.batchFilter=v;closeScreen(sc);setTimeout(openBatchesTab,260);}));
  sc.querySelectorAll(".batch-card").forEach(c=>c.addEventListener("click",()=>{closeScreen(sc);setTimeout(()=>openBatchDetail(c.dataset.id),260);}));
}

async function openBatchDetail(batchId){
  const batch=await DB.get("batches",batchId);if(!batch)return;
  const claimName=typeof batch.claim_name==="string"?batch.claim_name.trim():"";
  const items=(await DB.getByIndex("batch_entries","batch_id",batchId));
  const amounts=batchAmounts(items),isCancelled=batch.status==="cancelled";

  const batchCompany=state.companies.find(c=>c.id===batch.company_id);
  const rows=items.map(be=>{
    const oc=be.outcome;
    const live=state.entries.find(e=>e.id===be.entry_id),cmp=live?snapshotComparison(live,be,batchCompany):null;
    const ocClass={pending:"st-submitted-c",reimbursed:"st-reimbursed-c",rejected:"st-rejected-c"}[oc];
    const ocLabel={pending:"Pending",reimbursed:"Reimbursed",rejected:"Rejected → unclaimed"}[oc];
    return `<div class="claim-row" data-be="${esc(be.id)}" data-entry="${esc(be.entry_id)}" style="cursor:${isCancelled?"default":"pointer"};">
      <div class="info">
        <div class="t">${esc(snapshotDisplayName(be))}</div>
        <div class="s">${fmtDateShort(be.date_snapshot)} · <span class="mini-tag ${ocClass}">${ocLabel}</span>${cmp&&!cmp.matches?` · <span class="mini-tag st-rejected-c">Log changed: ${esc(cmp.changedFields.join(", "))}</span>`:""}</div>
      </div>
      <div class="a">${money(be.amount_minor_snapshot,be.currency_snapshot)}</div>
    </div>`;
  }).join("");

  const pendingCount=items.filter(i=>i.outcome==="pending").length;
  const reimbursedCount=items.filter(i=>i.outcome==="reimbursed").length;

  const reimbInfo = batch.reimbursed_date
    ? `<div class="r"><span class="k">Reimbursed on</span><span class="v">${fmtDate(batch.reimbursed_date)}</span></div>` : "";
  const slipBlock = batch.reimburse_proof
    ? `<div class="section-label">Payment slip</div>

  let actionBtn="";

    actionBtn+=`<button class="btn btn-positive" id="allPaid" style="margin-top:10px;">Reimburse all</button>`;
  }else if(!isCancelled&&reimbursedCount>0){
    actionBtn+=`<button class="btn btn-ghost" id="undoReimb" style="margin-top:10px;color:var(--danger);">Undo reimbursement</button>`;
  }
  if(!isCancelled&&reimbursedCount===0){ // nothing paid yet → the whole claim can be cancelled
    actionBtn+=`<button class="btn btn-danger" id="cancelClaim" style="margin-top:10px;">Cancel claim (return items to Unclaimed)</button>`;
  }

  const body=`
    <div class="kv">
      <div class="r"><span class="k">Claim ID</span><span class="v mono">${esc(batch.claim_no||"—")}</span></div>
      ${claimName?`<div class="r"><span class="k">Claim name</span><span class="v">${esc(claimName)}</span></div>`:""}
      <div class="r"><span class="k">Company</span><span class="v">${esc(companyName(batch.company_id))}</span></div>
      <div class="r"><span class="k">Submitted</span><span class="v">${fmtDate(batch.submitted_date)}</span></div>
      <div class="r"><span class="k">Date range</span><span class="v">${fmtDateShort(batch.range_start)} – ${fmtDateShort(batch.range_end)}</span></div>
      <div class="r"><span class="k">Status</span><span class="v">${isCancelled?"Cancelled":"Active"}</span></div>
      ${isCancelled?`<div class="r"><span class="k">Cancelled</span><span class="v">${fmtDate(new Date(batch.cancelled_at).toISOString().slice(0,10))}</span></div>`:""}
      <div class="r"><span class="k">Submitted total</span><span class="v mono">${amountLine(amounts.submitted)}</span></div>
      <div class="r"><span class="k">Pending amount</span><span class="v mono">${amountLine(amounts.pending)}</span></div>
      <div class="r"><span class="k">Reimbursed amount</span><span class="v mono">${amountLine(amounts.reimbursed)}</span></div>

      ${reimbInfo}

    ${slipBlock}
    <div class="hint" style="margin-bottom:6px;">${isCancelled?"This cancelled claim is retained as read-only history.":"Tap an item to mark it reimbursed or rejected. Rejected items go back to Unclaimed for a future claim."}</div>
    <div class="section-label">Items</div>
    ${rows}

    ${actionBtn}
  `;
  const sc=openScreen("Claim detail", body);
  sc.querySelector("#editClaimName").addEventListener("click",()=>{
    openSheet(`<h3>Edit claim name</h3><div class="field"><input type="text" id="claimNameEdit" maxlength="100" placeholder="e.g. July client travel" value="${esc(claimName)}"></div><button class="btn btn-primary" id="claimNameSave">Save</button><button class="btn btn-ghost" id="claimNameCancel" style="margin-top:10px;">Cancel</button>`);
    document.querySelector("#claimNameCancel").addEventListener("click",closeSheet);
    document.querySelector("#claimNameSave").addEventListener("click",async()=>{const value=document.querySelector("#claimNameEdit").value.trim();if(value.length>100){toast("The claim name must be 100 characters or fewer");return;}const current=await DB.get("batches",batchId);if(!current){toast("This claim no longer exists");return;}current.claim_name=value;await DB.put("batches",current);await loadAll();await markDataChanged();closeSheet();closeScreen(sc);setTimeout(()=>openBatchDetail(batchId),260);toast(value?"Claim name updated":"Claim name cleared");});
  });
  if(!isCancelled)sc.querySelectorAll(".claim-row").forEach(r=>r.addEventListener("click",()=>itemOutcomeSheet(r.dataset.be,r.dataset.entry,batchId)));
  sc.querySelector("#claimSheetBtn").addEventListener("click",()=>exportClaimSheet(batchId));

  const cancelBtn=sc.querySelector("#cancelClaim"); if(cancelBtn) cancelBtn.addEventListener("click",()=>cancelClaim(batchId,sc));
}

function viewImage(src){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(24,22,20,.94);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px;";
  ov.innerHTML=`<img src="${src}" style="max-width:100%;max-height:100%;border-radius:6px;">`;
  ov.addEventListener("click",()=>ov.remove());

async function readBatchLifecycle(s,req,batchId){
  const batch=await req(s.batches.get(batchId));if(!batch)throw lifecycleError("This claim no longer exists");

    }else if(active.length===0&&entry.status!=="unclaimed")throw lifecycleError("A rejected item and entry status disagree");

async function ensureNoOtherActiveMembership(s,req,be){

async function reimburseBatchWithSyncAtomic(batchId,date,slipUrl,slipType,expectedMismatches,expectedSnapshots){

async function undoReimbursementAtomic(batchId){

async function setItemOutcomeAtomic(beId,batchId,expectedOutcome,newOutcome){
  return DB.runTransaction(["companies","batches","batch_entries","entries"],"readwrite",async(s,t,req)=>{
    const batch=await req(s.batches.get(batchId));if(!batch)throw lifecycleError("This claim no longer exists");
    if(batch.status==="cancelled")throw lifecycleError("This cancelled claim is read-only");
    const be=await req(s.batch_entries.get(beId));if(!be||be.batch_id!==batchId)throw lifecycleError("This claim item no longer exists");
    if(be.outcome!==expectedOutcome)throw lifecycleError("This claim item changed — refresh and try again");
    if(!["pending","reimbursed","rejected"].includes(newOutcome)||newOutcome===be.outcome)throw lifecycleError("That item transition is no longer available");
    const entry=await req(s.entries.get(be.entry_id));if(!entry)throw lifecycleError("The referenced entry no longer exists");
    const expected=statusForOutcome(be.outcome);if(entry.status!==expected)throw lifecycleError("The claim item and entry status disagree");
    const allowed=(be.outcome==="pending"&&["reimbursed","rejected"].includes(newOutcome))||(be.outcome==="reimbursed"&&["pending","rejected"].includes(newOutcome))||(be.outcome==="rejected"&&newOutcome==="pending");if(!allowed)throw lifecycleError("That item transition is not allowed");
    if(be.outcome==="rejected"){

      for(const x of memberships){if(x.id===be.id)continue;const owner=await req(s.batches.get(x.batch_id));if(!owner)throw lifecycleError("This entry has a broken claim reference");if(owner.status!=="cancelled"&&(x.outcome==="pending"||x.outcome==="reimbursed"))throw lifecycleError("This entry already belongs to another active claim");}
    }
    if(newOutcome==="reimbursed"){const company=await req(s.companies.get(batch.company_id)),cmp=snapshotComparison(entry,be,company);if(!cmp.matches)throw lifecycleError(`This claim item no longer matches the Log (${cmp.changedFields.join(", ")}). Review and synchronize it before reimbursement.`);}

    if(newOutcome!=="reimbursed"&&(batch.reimbursed_date||batch.reimbursed_at||batch.reimburse_proof)){clearBatchReimbursement(batch);await req(s.batches.put(batch));}
  });
}
async function cancelClaimAtomic(batchId){
  return DB.runTransaction(["batches","batch_entries","entries"],"readwrite",async(s,t,req)=>{

// Batch-level reimbursement: capture the date + an optional payment-slip photo,
// then mark all pending items reimbursed. Slip is stored as a base64 data URL on
// the batch record so it travels inside JSON backups.
async function inspectBatchReimbursement(batchId){
  const batch=await DB.get("batches",batchId);if(!batch)throw lifecycleError("This claim no longer exists");if(batch.status==="cancelled")throw lifecycleError("This cancelled claim is read-only.");const items=await DB.getByIndex("batch_entries","batch_id",batchId),company=await DB.get("companies",batch.company_id),mismatches={},snapshots={},details=[];

/* ============================================================
