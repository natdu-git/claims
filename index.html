   ============================================================ */
async function exportClaimSheet(batchId){
  const batch=await DB.get("batches",batchId); if(!batch) return;
  const claimName=typeof batch.claim_name==="string"?batch.claim_name.trim():"";
  if(!state.claimantName){ promptClaimantName(()=>exportClaimSheet(batchId)); return; }  // name required on the sheet
  const items=(await DB.getByIndex("batch_entries","batch_id",batchId)).sort((a,b)=>a.date_snapshot.localeCompare(b.date_snapshot));
  const tot={}; items.forEach(i=>tot[i.currency_snapshot]=(tot[i.currency_snapshot]||0)+i.amount_minor_snapshot);
  const urls=[];
  let entriesHTML="",travelProofHTML="",withProof=0,expenseNo=0,travelNo=0;
  const travelRows=[],travelTotals={distance:0,fuel:0,toll:0,total:0};
  for(const be of items){
    const live=state.entries.find(x=>x.id===be.entry_id);
    const proofs=await DB.getByIndex("proofs","entry_id",be.entry_id);
    const imgs=proofs.filter(p=>p.file_type&&p.file_type.startsWith("image"));
    const pdfs=proofs.filter(p=>p.file_type&&!p.file_type.startsWith("image"));
    if(imgs.length||pdfs.length) withProof++;
    let proofHTML=imgs.map(p=>{const u=URL.createObjectURL(p.blob);urls.push(u);return `<img src="${u}">`;}).join("");
    if(pdfs.length) proofHTML+=`<div class="ppdf">${pdfs.length} PDF proof${pdfs.length>1?"s":""} attached (not shown)</div>`;
    if(imgs.length===0 && pdfs.length===0) proofHTML=`<div class="pproof-empty"></div>`;
    const snapshotType=be.type_snapshot??live?.type,type=snapshotType?snapshotType[0].toUpperCase()+snapshotType.slice(1):"";
    if(snapshotType==="travel"){
      travelNo++;const ref=`T${travelNo}`,dist=be.travel_distance_km_snapshot,rate=be.travel_fuel_rate_minor_snapshot,fuel=be.travel_fuel_minor_snapshot,toll=be.travel_toll_minor_snapshot,total=be.travel_total_minor_snapshot??be.amount_minor_snapshot,dest=be.travel_destination_snapshot??be.location_label_snapshot??be.vendor_snapshot??"—";
      if(Number.isFinite(dist))travelTotals.distance+=dist;if(Number.isSafeInteger(fuel))travelTotals.fuel+=fuel;if(Number.isSafeInteger(toll))travelTotals.toll+=toll;if(Number.isSafeInteger(total))travelTotals.total+=total;
      travelRows.push(`<tr><td>${ref}</td><td>${fmtDateShort(be.date_snapshot)}</td><td>${esc(dest)}</td><td class="num">${dist==null?"—":`${dist} km`}</td><td class="num">${rate==null?"—":`${money(rate,"THB")}/km`}</td><td class="num">${fuel==null?"—":money(fuel,"THB")}</td><td class="num">${toll?money(toll,"THB"):"—"}</td><td class="num">${money(total,"THB")}</td></tr>`);
      if(imgs.length||pdfs.length)travelProofHTML+=`<div class="travel-proof"><h4>${ref} · ${fmtDateShort(be.date_snapshot)} · ${esc(dest)}</h4><div class="pproof">${proofHTML}</div></div>`;
      continue;
    }
    const snapshotTags=be.tags_snapshot??live?.tags??[],snapshotNotes=be.notes_snapshot??live?.notes??"";
    const rows=[
      ["Company",esc(companyName(batch.company_id))],
      type?["Type",type]:null,
      ["Vendor",esc(be.vendor_snapshot)],
      ["Date",fmtDate(be.date_snapshot)],
      (be.original_currency && be.original_currency!==be.currency_snapshot)?["Original",money(be.original_amount_minor,be.original_currency)]:null,
      snapshotTags.length?["Tags",esc(snapshotTags.join(", "))]:null,
      snapshotNotes?["Notes",esc(snapshotNotes)]:null,
    ].filter(Boolean).map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join("");
    const ocLabel={pending:"Pending",reimbursed:"Reimbursed",rejected:"Rejected"}[be.outcome]||"";
    expenseNo++;entriesHTML+=`<div class="pitem">
      <div class="pcard">
        <div class="pitem-no">Item ${expenseNo}</div>
        <div class="pamt">${money(be.amount_minor_snapshot,be.currency_snapshot)}</div>
        <div class="pcur">${be.currency_snapshot}</div>
        ${ocLabel?`<div class="pstatus">${ocLabel}</div>`:""}
        <table class="pkv">${rows}</table>
      </div>
      <div class="pproof">${proofHTML}</div>
    </div>`;
  }
  const travelHTML=travelRows.length?`<div class="psection-title">Travel</div><table class="ptravel"><thead><tr><th>Ref</th><th>Date</th><th>Destination</th><th class="num">Total distance</th><th class="num">Fuel rate</th><th class="num">Fuel amount</th><th class="num">Toll</th><th class="num">Total amount</th></tr></thead><tbody>${travelRows.join("")}<tr><th colspan="3">Totals</th><th class="num">${Math.round(travelTotals.distance*10)/10} km</th><th></th><th class="num">${money(travelTotals.fuel,"THB")}</th><th class="num">${money(travelTotals.toll,"THB")}</th><th class="num">${money(travelTotals.total,"THB")}</th></tr></tbody></table>${travelProofHTML?`<div class="psection-title">Travel proofs</div>${travelProofHTML}`:""}`:"";
  const totalHTML=Object.keys(tot).map(c=>money(tot[c],c)).join(" · ");
  const host=document.createElement("div");
  host.className="print-host";
  host.innerHTML=`
    <div class="print-actions">
      <button class="btn btn-primary btn-sm" id="pPrint">Print / Save as PDF</button>
      <button class="btn btn-ghost btn-sm" id="pClose">Close</button>
    </div>
    <div class="psheet">
      <h2>Claim ${esc(batch.claim_no||"")}</h2>
      <table class="pkv psummary">
        <tr><td>Claim ID</td><td>${esc(batch.claim_no||"—")}</td></tr>
        ${claimName?`<tr><td>Claim name</td><td>${esc(claimName)}</td></tr>`:""}
        <tr><td>Claimant</td><td>${esc(state.claimantName||"—")}</td></tr>
        <tr><td>Company</td><td>${esc(companyName(batch.company_id))}</td></tr>
        <tr><td>Period</td><td>${fmtDate(batch.range_start)} – ${fmtDate(batch.range_end)}</td></tr>
        <tr><td>Submitted</td><td>${fmtDate(batch.submitted_date)}</td></tr>
        <tr><td>Items</td><td>${items.length}</td></tr>
        <tr><td>Total</td><td>${totalHTML}</td></tr>
        <tr><td>Receipts</td><td>${withProof} of ${items.length} have a receipt</td></tr>
      </table>
      ${entriesHTML}
      ${travelHTML}
      <div class="ptotal">Total: ${totalHTML}</div>
    </div>`;
  document.body.appendChild(host);
  const cleanup=()=>{ urls.forEach(u=>URL.revokeObjectURL(u)); host.remove(); };
  host.querySelector("#pClose").addEventListener("click",cleanup);
  host.querySelector("#pPrint").addEventListener("click",()=>window.print());
}

/* ============================================================
   CSV export
   ============================================================ */
function csvEscape(v){v=String(v??"");if(/^[=+\-@]/.test(v))v="'"+v;return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function downloadFile(name,content,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}
async function exportBatchCSV(batchId){
  const batch=await DB.get("batches",batchId);
  const claimName=typeof batch?.claim_name==="string"?batch.claim_name.trim():"";
  const items=await DB.getByIndex("batch_entries","batch_id",batchId);
  const header=["Date","Vendor","Amount","Currency","Outcome","Destination","Total distance","Fuel rate","Fuel amount","Toll","Total amount"];
  const lines=[["Claim ID",csvEscape(batch?.claim_no||"")].join(","),...(claimName?[["Claim name",csvEscape(claimName)].join(",")]:[]),"",header.join(",")];
  items.sort((a,b)=>a.date_snapshot.localeCompare(b.date_snapshot));
  items.forEach(i=>lines.push([i.date_snapshot,csvEscape(snapshotDisplayName(i)),(i.amount_minor_snapshot/100).toFixed(2),i.currency_snapshot,i.outcome,csvEscape(i.travel_destination_snapshot||""),i.travel_distance_km_snapshot??"",i.travel_fuel_rate_minor_snapshot==null?"":(i.travel_fuel_rate_minor_snapshot/100).toFixed(2),i.travel_fuel_minor_snapshot==null?"":(i.travel_fuel_minor_snapshot/100).toFixed(2),i.travel_toll_minor_snapshot==null?"":(i.travel_toll_minor_snapshot/100).toFixed(2),i.travel_total_minor_snapshot==null?"":(i.travel_total_minor_snapshot/100).toFixed(2)].join(",")));
  // totals
  const tot={};items.forEach(i=>tot[i.currency_snapshot]=(tot[i.currency_snapshot]||0)+i.amount_minor_snapshot);
  lines.push("");
  Object.keys(tot).forEach(c=>lines.push(["","TOTAL "+c,(tot[c]/100).toFixed(2),c,""].join(",")));
  const cname=companyName(batch.company_id).replace(/[^a-z0-9]/gi,"_");
  const fname=batch.claim_no ? batch.claim_no : `claim_${cname}_${batch.submitted_date}`;
  downloadFile(`${fname}.csv`, lines.join("\n"), "text/csv");
  toast("CSV downloaded");
}

async function exportFilteredCSV(){
  const list=filteredEntries();
  if(list.length===0){toast("Nothing to export");return;}

  ].join(",")));

    };

    const now=Date.now();
    await DB.put("meta",{k:"lastBackupAt",v:now});
    state.lastBackupAt=now;
    renderBackupBanner();
    toast(`Backup saved · ${proofs.length} receipt${proofs.length!==1?"s":""} included`);
  }
  if(totalBytes>50*1024*1024){
    const mb=Math.round(totalBytes/(1024*1024));
    openSheet(`<h3>Large backup</h3><p class="hint" style="margin-bottom:16px;">Your receipts add up to ${mb} MB. Creating one backup file this large may fail on a phone. You can still try, or reduce size by removing old receipt photos.</p><button class="btn btn-primary" id="bkpAnyway">Create backup anyway</button><button class="btn btn-ghost" id="bkpCancel" style="margin-top:10px;">Cancel</button>`);
    $("#bkpAnyway").addEventListener("click",async()=>{await doExport();closeSheet();});
    $("#bkpCancel").addEventListener("click",closeSheet);
    return;
  }
  await doExport();
}

function restoreStage(message){toast(message);const b=$("#impYes");if(b){b.disabled=true;b.textContent=message;}}
function comparableRecord(n,r){if(n!=="proofs")return JSON.stringify(r);const {blob,...rest}=r;return JSON.stringify({...rest,_blobSize:blob instanceof Blob?blob.size:-1,_blobType:blob instanceof Blob?blob.type:""});}
function compareStoreKeys(expected,actual){for(const n of APP_STORES){const a=new Map(expected[n].map(r=>[String(keyForStore(n,r)),comparableRecord(n,r)])),b=new Map(actual[n].map(r=>[String(keyForStore(n,r)),comparableRecord(n,r)]));if(a.size!==b.size)throw restoreError("Verifying restored data",`Verification failed for ${n}`);for(const [key,value] of a)if(b.get(key)!==value)throw restoreError("Verifying restored data",`Record '${key}' failed verification in ${n}`);}}
async function recoverPreviousData(){
  restoreStage("Restoring previous data…");const db=await openNamedDB(RESTORE_RECOVERY_DB);let old;try{old=await readAllFromDB(db);}finally{db.close();}
  await replaceActiveAtomic(old);compareStoreKeys(old,await snapshotActive());await loadAll();await renderHome();localStorage.removeItem(RESTORE_MARKER);await deleteNamedDB(RESTORE_STAGE_DB).catch(()=>{});await deleteNamedDB(RESTORE_RECOVERY_DB).catch(()=>{});closeSheet();toast("Previous data restored");
}
function offerRecovery(message){
  openSheet(`<h3>Restore could not be verified</h3><p class="hint" style="margin-bottom:14px;">${esc(message)} A verified recovery copy of your previous data is available.</p><button class="btn btn-danger" id="recoverOld">Restore previous data</button>`);
  $("#recoverOld").addEventListener("click",async()=>{try{await recoverPreviousData();}catch(e){console.error(e);toast("Recovery failed — do not clear browser data");}});

function importBackup(){
  const inp=document.createElement("input");inp.type="file";inp.accept="application/json,.json";
  inp.addEventListener("change",async()=>{const f=inp.files&&inp.files[0];if(!f)return;let normalized;
    try{toast("Reading backup…");const raw=JSON.parse(await f.text());toast("Validating records…");normalized=normalizeBackup(raw);toast("Validating receipts…");}
    catch(e){console.error("Backup validation failed",e);toast(`${e.stage||"Reading backup"}: ${e.message}`);return;}
    const s=normalized.stores,counts=`${s.entries.length} entries · ${s.companies.length} companies · ${s.proofs.length} receipts`;
    openSheet(`<h3>Restore this validated backup?</h3><p class="hint" style="margin-bottom:14px;">This safely replaces current app data after creating an internal recovery copy:<br>${counts}.</p><button class="btn btn-danger" id="impYes">Replace &amp; restore</button><button class="btn btn-ghost" id="impNo" style="margin-top:10px;">Cancel</button>`);
    $("#impYes").addEventListener("click",()=>doRestore(normalized));$("#impNo").addEventListener("click",closeSheet);
  });inp.click();
}
async function doRestore(normalized){
  const stores=normalized.stores;let committed=false;const unload=e=>{e.preventDefault();e.returnValue="";};window.addEventListener("beforeunload",unload);
  try{
    restoreStage("Preparing safe restore…");await prepareNamedCopy(RESTORE_STAGE_DB,stores);
    const current=await snapshotActive();await prepareNamedCopy(RESTORE_RECOVERY_DB,current);
    localStorage.setItem(RESTORE_MARKER,JSON.stringify({phase:"recovery-ready",createdAt:Date.now()}));
    localStorage.setItem(RESTORE_MARKER,JSON.stringify({phase:"replacing-active",createdAt:Date.now()}));
    restoreStage("Replacing database…");await replaceActiveAtomic(stores);committed=true;localStorage.setItem(RESTORE_MARKER,JSON.stringify({phase:"active-committed",createdAt:Date.now()}));
    restoreStage("Verifying restored data…");compareStoreKeys(stores,await snapshotActive());
    await loadAll();await renderHome();closeSheet();localStorage.removeItem(RESTORE_MARKER);
    await deleteNamedDB(RESTORE_STAGE_DB).catch(()=>{});await deleteNamedDB(RESTORE_RECOVERY_DB).catch(()=>{});
    $$("#screens .screen").forEach(s=>closeScreen(s));toast("Restore complete");
  }catch(e){console.error("Restore failed",e);if(committed)offerRecovery(`${e.stage||"Restore"}: ${e.message}`);else toast(`${e.stage||"Restore"}: ${e.message}. Current data was not changed.`);}
  finally{window.removeEventListener("beforeunload",unload);}
}

/* ============================================================
   Image cropping
   Opens a lightweight crop tool for a picked image and resolves
   to a cropped Blob. Returns the original file if the user keeps
   the full photo, or null if they cancel. PDFs never come here.
   ============================================================ */
function cropImage(file){
  return new Promise(resolve=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onerror=()=>{ URL.revokeObjectURL(url); resolve(file); };
    img.onload=()=>{
      // Fit the image inside the screen while keeping aspect ratio.
      const maxW=window.innerWidth*0.92, maxH=window.innerHeight*0.66;
      const r=Math.min(maxW/img.naturalWidth, maxH/img.naturalHeight, 1);
      const dispW=Math.max(1,Math.round(img.naturalWidth*r));
      const dispH=Math.max(1,Math.round(img.naturalHeight*r));

      const ov=document.createElement("div");
      ov.className="cropper-ov";
      ov.innerHTML=`
        <div class="cropper-title">Drag the box to move · pull a corner to resize</div>
        <div class="cropper-stage">
          <img src="${url}" style="width:${dispW}px;height:${dispH}px;">
          <div class="crop-box"><div class="crop-h tl"></div><div class="crop-h tr"></div><div class="crop-h bl"></div><div class="crop-h br"></div></div>
        </div>
        <div class="cropper-bar">
          <button class="btn btn-ghost btn-sm" id="crFull">Use full photo</button>
          <button class="btn btn-primary btn-sm" id="crDo">Crop &amp; use</button>
        </div>
        <div class="cropper-bar"><button class="btn btn-danger btn-sm" id="crCancel">Cancel</button></div>`;
      document.body.appendChild(ov);

      const box=ov.querySelector(".crop-box");
      const MIN=32;
      let cx=0, cy=0;            // crop box starts as the FULL image by default
      let cw=dispW, ch=dispH;
      function apply(){ box.style.left=cx+"px"; box.style.top=cy+"px"; box.style.width=cw+"px"; box.style.height=ch+"px"; }
      apply();

      let mode=null, sx=0, sy=0, ox=0, oy=0, ow=0, oh=0;
      function down(e,m){ e.preventDefault(); mode=m; sx=e.clientX; sy=e.clientY; ox=cx; oy=cy; ow=cw; oh=ch;
        window.addEventListener("pointermove",move); window.addEventListener("pointerup",up); }
      function move(e){
        if(!mode) return;
        const dx=e.clientX-sx, dy=e.clientY-sy;
        if(mode==="move"){
          cx=Math.min(Math.max(0,ox+dx), dispW-cw);
          cy=Math.min(Math.max(0,oy+dy), dispH-ch);
        }else{
          let nx=ox, ny=oy, nw=ow, nh=oh;
          if(mode.includes("l")){ nx=ox+dx; nw=ow-dx; }
          if(mode.includes("r")){ nw=ow+dx; }
          if(mode.includes("t")){ ny=oy+dy; nh=oh-dy; }
          if(mode.includes("b")){ nh=oh+dy; }
          if(nw<MIN){ if(mode.includes("l")) nx=ox+ow-MIN; nw=MIN; }
          if(nh<MIN){ if(mode.includes("t")) ny=oy+oh-MIN; nh=MIN; }
          if(nx<0){ nw+=nx; nx=0; }
          if(ny<0){ nh+=ny; ny=0; }
          if(nx+nw>dispW) nw=dispW-nx;
          if(ny+nh>dispH) nh=dispH-ny;
          cx=nx; cy=ny; cw=nw; ch=nh;
        }
        apply();
      }
      function up(){ mode=null; window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); }
      box.addEventListener("pointerdown",e=>{ if(e.target.classList.contains("crop-h")) return; down(e,"move"); });
      box.querySelector(".tl").addEventListener("pointerdown",e=>down(e,"tl"));
      box.querySelector(".tr").addEventListener("pointerdown",e=>down(e,"tr"));
      box.querySelector(".bl").addEventListener("pointerdown",e=>down(e,"bl"));
      box.querySelector(".br").addEventListener("pointerdown",e=>down(e,"br"));

      function cleanup(){ window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); ov.remove(); URL.revokeObjectURL(url); }
      ov.querySelector("#crCancel").addEventListener("click",()=>{ cleanup(); resolve(null); });
      ov.querySelector("#crFull").addEventListener("click",()=>{ cleanup(); resolve(file); });
      ov.querySelector("#crDo").addEventListener("click",()=>{
        const scale=img.naturalWidth/dispW; // display px -> natural px
        const sw=Math.max(1,Math.round(cw*scale)), sh=Math.max(1,Math.round(ch*scale));
        const canvas=document.createElement("canvas"); canvas.width=sw; canvas.height=sh;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img, Math.round(cx*scale), Math.round(cy*scale), sw, sh, 0, 0, sw, sh);
        canvas.toBlob(b=>{ cleanup(); resolve(b||file); }, "image/jpeg", 0.9);
      });
    };
    img.src=url;
  });
}

// Add picked files to the current draft's proofs. Images pass through the
// cropper first; PDFs are stored as-is. rerender() refreshes the thumbnails.
async function ingestProofs(files, rerender){
  for(const f of files){
    if(f.type && f.type.startsWith("image")){
      const blob=await cropImage(f);
      if(!blob) continue; // user cancelled this image
      draft._proofs.push({id:uid(), file_type:blob.type||f.type, name:f.name, blob, _existing:false});
    }else{
      draft._proofs.push({id:uid(), file_type:f.type, name:f.name, blob:f, _existing:false});
    }
    rerender();
  }
}

// Ask the browser to keep our data safe from automatic eviction.
// Runs in the background; never blocks startup and fails quietly if unsupported.
async function requestPersistentStorage(){
  try{
    if(navigator.storage && navigator.storage.persist){
      const already = await navigator.storage.persisted();
      if(!already){ await navigator.storage.persist(); }
    }
  }catch(e){ /* older browsers: ignore, data still saves normally */ }
}

(async function boot(){
  try{
    await DB.open();
    requestPersistentStorage();
    await loadAll();
    await migrateClaimIds();
    await renderHome();
    const pendingRestore=localStorage.getItem(RESTORE_MARKER);
    if(pendingRestore){
      setTimeout(()=>{openSheet(`<h3>Confirm restored data</h3><p class="hint" style="margin-bottom:14px;">Claims was interrupted during a restore. The restored data loaded successfully, and the previous data is still available as a recovery copy.</p><button class="btn btn-primary" id="keepRestored">Keep restored data</button><button class="btn btn-danger" id="bootRecover" style="margin-top:10px;">Restore previous data</button>`);
        $("#keepRestored").addEventListener("click",async()=>{localStorage.removeItem(RESTORE_MARKER);await deleteNamedDB(RESTORE_STAGE_DB).catch(()=>{});await deleteNamedDB(RESTORE_RECOVERY_DB).catch(()=>{});closeSheet();toast("Restored data confirmed");});
        $("#bootRecover").addEventListener("click",async()=>{try{await recoverPreviousData();}catch(e){console.error(e);toast("Recovery failed — do not clear browser data");}});
      },450);
    }
    if(state.companies.length===0){ setTimeout(()=>openCompanies(true),400); }
  }catch(err){
    document.body.innerHTML=`<div style="padding:40px;font-family:sans-serif;color:#16202b;">
      <h2>Storage unavailable</h2>
      <p>This app needs on-device storage (IndexedDB), which your browser blocked — this usually happens when the file is opened directly (file://) or in private mode.</p>
      <p><strong>Fix:</strong> host the file (e.g. GitHub Pages) and open it over https, or open it in a normal browser tab. Then your data will save on this device.</p>
      <p style="color:#64748b;font-size:13px;">Details: ${esc(err&&err.message||err)}</p>
    </div>`;
  }
})();
</script>
