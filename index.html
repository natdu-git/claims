<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f2f0e9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Claims">
<title>Claims</title>
<style>
  :root{
    --ink:#1f1e1d;
    --ink-soft:#73716b;
    --paper:#f2f0e9;
    --surface:#ffffff;
    --soft:#efece3;
    --line:#e6e2d7;
    --line-strong:#d3cfc2;
    --line-soft:#efece4;
    --jade:#c96442;
    --jade-deep:#a94f33;
    --slate:#8a887f;      /* unclaimed */
    --amber:#b07636;      /* submitted / outstanding */
    --green:#5f7a4d;      /* reimbursed */
    --danger:#b3402f;
    --mono:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --r:14px;
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    font-size:16px;
    line-height:1.4;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(62px + var(--safe-b));
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
  .hidden{display:none !important;}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:20;
    background:var(--surface);color:var(--ink);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 16px;
  }
  .topbar .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--ink-soft);}
  .topbar .brand .dot{width:7px;height:7px;border-radius:2px;background:var(--jade);}
  .owed-label{font-size:12px;color:var(--ink-soft);margin-top:14px;letter-spacing:.03em;}
  .owed-figs{display:flex;flex-wrap:wrap;gap:6px 20px;margin-top:4px;align-items:baseline;}
  .owed-figs .fig{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:26px;font-weight:600;letter-spacing:-.02em;}
  .owed-figs .fig.zero{color:var(--slate);font-size:20px;}
  .owed-sub{font-size:11px;color:var(--ink-soft);margin-top:3px;}

  /* ---------- Filter chips ---------- */
  .filters{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:500;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .chip .x{font-size:15px;line-height:1;opacity:.7;}

  /* ---------- Log rows ---------- */
  .log{padding:8px 0 0;}
  .day-head{padding:16px 18px 6px;font-size:13px;font-weight:600;color:var(--ink-soft);}
  .day-group{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);overflow:hidden;margin:0 12px;}
  .row{display:flex;align-items:stretch;position:relative;}
  .row:active{background:#f6f8fa;}
  .row .accent{width:5px;flex:none;}
  .row-div{height:1px;background:var(--line-soft);margin-left:18px;}
  .row .body{flex:1;min-width:0;padding:11px 13px;}
  .noproof-top{position:absolute;top:9px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--amber);font-weight:600;white-space:nowrap;z-index:1;}
  .rline1{display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .rline1 .vendor{font-weight:600;font-size:15px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rline1 .amt-main{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;font-size:15.5px;color:var(--ink);white-space:nowrap;flex:none;letter-spacing:-.02em;}
  .amt-conv{color:var(--slate);font-weight:500;}
  .amt-need{color:var(--amber);font-weight:500;}
  .rline2{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:4px;}
  .rline2 .meta{font-size:12.5px;color:var(--slate);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rline2 .cur{font-size:10.5px;font-weight:600;letter-spacing:.04em;color:var(--slate);white-space:nowrap;flex:none;}
  .row .type-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:1px 5px;border-radius:4px;margin-right:6px;vertical-align:1px;}
  .type-travel{background:#e5f3f1;color:var(--jade-deep);}
  .type-expense{background:#eef0f2;color:var(--ink-soft);}
  .co-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:0;}
  .row-tags{font-size:11px;color:var(--slate);margin-top:3px;line-height:1.3;}
  .st-word-unclaimed{color:var(--slate);}
  .st-word-submitted{color:var(--amber);}
  .st-word-reimbursed{color:var(--green);}
  .swatches{display:flex;flex-wrap:wrap;gap:10px;}
  .swatch{width:30px;height:30px;border-radius:50%;border:2px solid rgba(0,0,0,.12);}
  .swatch.on{outline:2px solid var(--ink);outline-offset:2px;}

  /* status accents */
  .st-unclaimed{background:var(--slate);}
  .st-submitted{background:var(--amber);}
  .st-reimbursed{background:var(--green);}
  .st-rejected{background:var(--danger);}

  .empty{text-align:center;color:var(--slate);padding:60px 30px;}
  .empty h3{color:var(--ink);font-weight:600;margin:0 0 6px;}
  .empty p{margin:0;font-size:14px;}

  /* ---------- Bottom nav + FAB ---------- */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:45;
    background:var(--surface);border-top:1px solid var(--line);
    display:flex;padding:3px 6px calc(3px + var(--safe-b));
  }
  body.form-open .tabbar{display:none;}
  .tabbar button{flex:1;padding:4px 4px;font-family:var(--sans);font-size:10px;font-weight:500;color:var(--slate);display:flex;flex-direction:column;align-items:center;gap:1px;border-radius:8px;line-height:1.1;}
  .tabbar button.active{color:var(--jade);}
  .tabbar button svg{width:18px;height:18px;}
  .fab{
    position:fixed;right:18px;bottom:calc(54px + var(--safe-b));z-index:31;
    width:52px;height:52px;border-radius:16px;background:var(--jade);color:#fff;
    box-shadow:0 8px 22px rgba(15,118,110,.4);
    display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:300;
  }
  .fab:active{transform:scale(.94);}

  /* ---------- Screen (overlay) ---------- */
  .screen{
    position:fixed;inset:0;z-index:40;background:var(--paper);
    transform:translateX(100%);transition:transform .22s ease;
    display:flex;flex-direction:column;
  }
  .screen.show{transform:translateX(0);}
  .screen-head{
    position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top,0px) + 12px) 14px 12px;
    display:flex;align-items:center;gap:10px;
  }
  .screen-head .back{font-size:15px;font-weight:600;color:var(--jade);padding:4px 6px;display:flex;align-items:center;gap:3px;}
  .screen-head h2{font-size:17px;font-weight:700;margin:0;flex:1;text-align:center;}
  .screen-head .right{min-width:64px;text-align:right;}
  .screen-head .right button{color:var(--jade);font-weight:700;font-size:15px;padding:4px 6px;}
  .screen-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 14px calc(70px + var(--safe-b));}

  /* ---------- Form ---------- */
  .field{margin-bottom:12px;}
  .field > label{display:block;font-size:13px;font-weight:500;letter-spacing:0;text-transform:none;color:var(--ink-soft);margin-bottom:6px;}
  .field .req{color:var(--danger);}
  .field .opt{color:var(--slate);font-weight:500;text-transform:none;letter-spacing:0;font-size:11px;}
  input[type=text],input[type=number],input[type=date],textarea,select{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface);
    outline:none;transition:border-color .15s;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--jade);box-shadow:0 0 0 3px rgba(15,118,110,.12);}
  textarea{resize:vertical;min-height:56px;}
  .lrow{display:flex;align-items:center;gap:12px;}
  .lrow > label{width:33%;flex:none;font-size:13px;font-weight:500;color:var(--ink-soft);margin:0;}
  .lrow.tall{align-items:flex-start;}
  .lrow.tall > label{padding-top:9px;}
  .lrow > .lctl{flex:1;min-width:0;display:flex;justify-content:flex-end;}
  .lctl > *{width:100%;}
  .lctl > .switch{width:auto;}
  .lrow .lctl input[type=text]{text-align:right;}
  .lctl .tag-search{text-align:left;}
  .lbreak{border-top:1px solid var(--line);}
  #backupBanner{display:none;}
  .bkp-inner{display:flex;align-items:center;gap:10px;justify-content:space-between;background:#fbe7e2;border:1px solid #e9c3b6;color:#8a3b22;border-radius:11px;padding:9px 12px;margin:10px 14px 0;font-size:12.5px;line-height:1.35;}
  .bkp-inner button{background:var(--jade);color:#fff;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;white-space:nowrap;flex:none;}
  .date-wrap{position:relative;}
  .date-text{display:block;width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface);font-size:16px;color:var(--ink);}
  .date-overlay{position:absolute;inset:0;width:100%;height:100%;opacity:0;}
  .amount-row{display:flex;gap:0;}
  .amount-row input{flex:1;font-family:var(--mono);font-size:20px;font-weight:600;text-align:right;letter-spacing:-.02em;border-top-right-radius:0;border-bottom-right-radius:0;}
  .amount-row select{width:62px;flex:none;font-weight:400;font-size:14px;color:var(--ink-soft);border-top-left-radius:0;border-bottom-left-radius:0;border-left:none;padding-left:6px;padding-right:4px;}

  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:10px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface);font-weight:600;font-size:15px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:7px;}
  .seg button .ic{font-size:20px;}
  .seg button.on{border-color:var(--jade);background:#effaf8;color:var(--jade-deep);}

  .picker-list{display:flex;flex-wrap:wrap;gap:8px;}
  .pill{padding:9px 14px;border:1.5px solid var(--line);border-radius:999px;background:var(--surface);font-weight:600;font-size:14px;color:var(--ink-soft);}
  .pill.on{border-color:var(--jade);background:#effaf8;color:var(--jade-deep);}
  .pill.add{border-style:dashed;color:var(--slate);}

  .tag{padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:13.5px;font-weight:500;color:var(--ink-soft);}
  .tag.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tag.more,.tag.add{background:var(--soft);border-style:dashed;color:var(--slate);}
  .tag-search{margin-bottom:8px;font-size:14px;}

  .loc-box{border:1px solid var(--line);border-radius:11px;padding:11px;background:var(--surface);}
  .loc-coords{font-family:var(--mono);font-size:13px;color:var(--ink-soft);}
  .btn{display:block;width:100%;text-align:center;padding:14px;border-radius:12px;font-weight:600;font-size:15px;}
  .btn-primary{background:var(--jade);color:#fff;}
  .btn-primary:active{background:var(--jade-deep);}
  .btn-primary:disabled{background:#a9c4c0;}
  .btn-ghost{background:var(--surface);color:var(--jade);border:1.5px solid var(--line);}
  .btn-danger{background:#fdecec;color:var(--danger);border:1.5px solid #f3cccc;}
  .btn-sm{padding:9px 13px;font-size:13.5px;border-radius:10px;}
  .btn-row{display:flex;gap:10px;margin-top:8px;}
  .btn-row .btn{flex:1;}

  .proofs{display:flex;flex-wrap:wrap;gap:10px;}
  .proof-thumb{position:relative;width:78px;height:78px;border-radius:11px;overflow:hidden;border:1px solid var(--line);background:#f0f3f6;display:flex;align-items:center;justify-content:center;}
  .proof-thumb img{width:100%;height:100%;object-fit:cover;}
  .proof-thumb .pdf{font-size:11px;font-weight:700;color:var(--danger);}
  .proof-thumb .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;width:20px;height:20px;border-radius:50%;font-size:13px;line-height:20px;text-align:center;}
  .add-proof{width:78px;height:78px;border-radius:11px;border:1.5px dashed var(--line);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--slate);font-size:11px;font-weight:600;}
  .add-proof .plus{font-size:22px;font-weight:300;line-height:1;}

  /* image cropper */
  .cropper-ov{position:fixed;inset:0;background:rgba(24,22,20,.94);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px;}
  .cropper-title{color:#f2f0e9;font-size:13px;opacity:.85;text-align:center;}
  .cropper-stage{position:relative;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;line-height:0;}
  .cropper-stage img{display:block;-webkit-user-drag:none;}
  .crop-box{position:absolute;border:2px solid #fff;box-shadow:0 0 0 9999px rgba(0,0,0,.5);box-sizing:border-box;cursor:move;}
  .crop-h{position:absolute;width:22px;height:22px;background:var(--jade);border:2px solid #fff;border-radius:50%;box-sizing:border-box;}
  .crop-h.tl{left:-12px;top:-12px;} .crop-h.tr{right:-12px;top:-12px;}
  .crop-h.bl{left:-12px;bottom:-12px;} .crop-h.br{right:-12px;bottom:-12px;}
  .cropper-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

  /* claim print sheet */
  .print-host{position:fixed;inset:0;background:#fff;color:#1f1e1d;z-index:10000;overflow:auto;padding:16px 18px;-webkit-overflow-scrolling:touch;}
  .print-actions{display:flex;gap:10px;position:sticky;top:0;background:#fff;padding-bottom:10px;}
  .psheet h2{font-size:19px;margin:6px 0 8px;}
  .psheet .pmeta{color:#666;font-size:12.5px;margin-bottom:14px;}
  .psummary{max-width:380px;margin-bottom:18px;font-size:13px;}
  .pitem{display:flex;gap:14px;align-items:stretch;border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:14px;}
  .pcard{flex:0 0 46%;max-width:46%;}
  .pcard .pamt{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
  .pcard .pcur{font-size:12px;color:#666;margin-top:1px;}
  .pcard .pstatus{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:999px;background:#f0ede6;color:#7a3b22;margin:6px 0 10px;}
  .pkv{width:100%;border-collapse:collapse;font-size:12.5px;}
  .pkv td{padding:5px 0;border-top:1px solid #eee;vertical-align:top;}
  .pkv tr:first-child td{border-top:none;}
  .pkv td:first-child{color:#888;width:32%;}
  .pkv td:last-child{font-weight:600;text-align:right;}
  .pproof{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;}
  .pproof img{width:100%;max-height:90mm;object-fit:contain;object-position:top;border:1px solid #ddd;border-radius:6px;}
  .pproof-empty{flex:1;min-height:200px;border:1px dashed #ccc;border-radius:6px;}
  .ppdf{font-size:12px;color:#8a887f;font-style:italic;}
  .ptotal{margin-top:16px;font-size:16px;font-weight:700;}
  @media print{
    body{visibility:hidden;}
    .print-host{position:absolute;top:0;left:0;padding:0;overflow:visible;}
    .print-host,.print-host *{visibility:visible;}
    .print-actions{display:none !important;}
    .pitem{break-inside:avoid;page-break-inside:avoid;}
    .pproof img{max-height:90mm;}
  }
  @page{size:A4 portrait;margin:12mm;}

  /* summary card */
  .summary{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
  .summary .srow{display:flex;justify-content:space-between;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line-soft);font-size:14.5px;}
  .summary .srow:last-child{border-bottom:none;}
  .summary .srow .k{color:var(--slate);font-weight:500;}
  .summary .srow .v{font-weight:600;text-align:right;}
  .summary .srow .v.big{font-family:var(--mono);font-size:18px;}

  /* detail */
  .det-amt{text-align:center;padding:22px 0 8px;}
  .det-amt .n{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:40px;font-weight:600;letter-spacing:-.02em;}
  .det-amt .cur{font-size:14px;color:var(--slate);font-weight:600;}
  .status-line{display:flex;justify-content:center;gap:8px;margin:6px 0 20px;}
  .status-tag{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:700;}
  .status-tag.st-unclaimed-c{background:#eef1f4;color:var(--slate);}
  .status-tag.st-submitted-c{background:#fdf0e0;color:var(--amber);}
  .status-tag.st-reimbursed-c{background:#e6f4ea;color:var(--green);}
  /* shared status colours (used by status-tag and mini-tag) */
  .st-unclaimed-c{background:#eef1f4;color:var(--slate);}
  .st-submitted-c{background:#fdf0e0;color:var(--amber);}
  .st-reimbursed-c{background:#e6f4ea;color:var(--green);}
  .st-rejected-c{background:#fbe9e6;color:var(--danger);}

  .kv{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:16px;overflow:hidden;}
  .kv .r{display:flex;justify-content:space-between;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line-soft);font-size:14.5px;}
  .kv .r:last-child{border-bottom:none;}
  .kv .r .k{color:var(--slate);}
  .kv .r .v{font-weight:600;text-align:right;max-width:62%;}
  .edit-log{font-size:12.5px;color:var(--slate);}
  .edit-log .e{padding:7px 0;border-bottom:1px solid var(--line-soft);}
  .edit-log .e:last-child{border:none;}

  .section-label{font-size:13px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--ink-soft);margin:16px 4px 8px;}

  /* claim */
  .claim-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
  .claim-row .cbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;}
  .claim-row.sel .cbox{background:var(--jade);border-color:var(--jade);}
  .claim-row .info{flex:1;min-width:0;}
  .claim-row .info .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .claim-row .info .s{font-size:12.5px;color:var(--slate);margin-top:2px;}
  .claim-row .a{font-family:var(--mono);font-weight:600;text-align:right;}
  .totbar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--line);padding:14px;margin:0 -14px;}
  .tot-figs{display:flex;flex-wrap:wrap;gap:4px 18px;margin-bottom:10px;}
  .tot-figs .tf{font-family:var(--mono);font-weight:600;font-size:18px;}
  .warn{background:#fdf0e0;color:var(--amber);border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;margin-bottom:10px;}

  .batch-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-bottom:12px;}
  .batch-card .bh{display:flex;justify-content:space-between;align-items:baseline;}
  .batch-card .bh .bt{font-weight:700;}
  .batch-card .bh .bd{font-size:12.5px;color:var(--slate);}
  .batch-card .bstat{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;}
  .mini-tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;}
  .row-tags{font-size:11px;color:var(--slate);margin-top:2px;line-height:1.3;}
  .tp-list{display:flex;flex-direction:column;gap:0;max-height:44vh;overflow-y:auto;border:1px solid var(--line);border-radius:12px;margin-top:8px;}

  /* ---------- Compact entry form (one screen, 2-up rows) ---------- */

  .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end;}

  .searchbar{background:var(--surface);padding:8px 12px;border-bottom:1px solid var(--line);}

<body>

<!-- ===== HOME ===== -->
<div class="topbar">

<!-- Screens get injected here -->

<!-- bottom sheet -->

<script>
"use strict";
/* ============================================================
   Claims — personal multi-company expense tracker
   Local-first: all data in IndexedDB on this device.
   ============================================================ */

/* ---------- constants ---------- */
const CURRENCIES = ["THB","RMB","USD"];
const CUR_SYM = {THB:"฿", RMB:"¥", USD:"$"};
const STATUS_LABEL = {unclaimed:"Unclaimed", submitted:"Submitted", reimbursed:"Reimbursed"};
// Company dot colours — deliberately NOT the status colours (grey/amber/green/red), so a
// company dot is never mistaken for a status. Blue / purple / teal / pink family.
const COMPANY_PALETTE = ["#3f74c9","#7a5bd0","#1f9d8f","#cf5f93","#2b9fd6","#9a55b8","#556fb5","#c65f7a"];
function companyColor(id){const c=state.companies.find(x=>x.id===id);return (c&&c.color)||"#b4b2a9";}
// THB claim value of an entry. THB entries use their own amount; foreign entries use the
// manually-entered claim_thb_minor (null until filled from the card statement).
function claimThb(e){ return e.currency==="THB" ? e.amount_minor : (e.claim_thb_minor!=null ? e.claim_thb_minor : null); }
// Short code used as the claim-ID prefix (e.g. "TOTEM"). Auto-derived from the name but editable.
function codeFromName(name){ return ((name||"").toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6)) || "CO"; }
// Human-readable claim ID: CODE-YEAR-NNN, with a persistent per-company-per-year counter in meta.
async function nextClaimNo(companyId, year){
  year = year || new Date().getFullYear();
  const comp=state.companies.find(c=>c.id===companyId);
  const code=(comp&&comp.code)||codeFromName(comp&&comp.name);
  const key=`claimseq:${companyId}:${year}`;
  const cur=(await DB.get("meta",key))?.v||0;
  const next=cur+1;
  await DB.put("meta",{k:key,v:next});
  return `${code}-${year}-${String(next).padStart(3,"0")}`;
}
// One-time backfill: give existing batches a claim_no, oldest first, using each batch's own year.
async function migrateClaimIds(){
  const batches=(await DB.getAll("batches")).filter(b=>!b.claim_no).sort((a,b)=>(a.created_at||0)-(b.created_at||0));
  for(const b of batches){
    const year=new Date(b.created_at||Date.now()).getFullYear();
    b.claim_no=await nextClaimNo(b.company_id, year);
    await DB.put("batches",b);
  }
}

/* ---------- tiny DOM helpers ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const uid = ()=> (Date.now().toString(36)+Math.random().toString(36).slice(2,9));
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function money(minor,cur){const v=(minor/100);return CUR_SYM[cur]+v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function todayISO(){const d=new Date();const o=d.getTimezoneOffset();return new Date(d-o*60000).toISOString().slice(0,10);}
const MONTHS_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(iso){if(!iso)return"";const [y,m,d]=iso.split("-");return `${+d} ${MONTHS_ABBR[+m-1]||""} ${y}`;}
function fmtDateShort(iso){if(!iso)return"";const [y,m,d]=iso.split("-");return `${+d} ${MONTHS_ABBR[+m-1]||""} ${y}`;}
function fmtDateText(iso){if(!iso)return"Pick a date";return fmtDate(iso);}

function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}

/* ============================================================
   IndexedDB layer
   ============================================================ */
const DB = (()=>{
  let db=null;
  const NAME="ledger_db", VER=1;
  function open(){
    return new Promise((res,rej)=>{
      const rq=indexedDB.open(NAME,VER);
      rq.onupgradeneeded=e=>{
        const d=e.target.result;
        if(!d.objectStoreNames.contains("companies")) d.createObjectStore("companies",{keyPath:"id"});
        if(!d.objectStoreNames.contains("entries")){
          const s=d.createObjectStore("entries",{keyPath:"id"});
          s.createIndex("company_id","company_id");
          s.createIndex("status","status");
          s.createIndex("payment_date","payment_date");
        }
        if(!d.objectStoreNames.contains("tags")) d.createObjectStore("tags",{keyPath:"name"});
        if(!d.objectStoreNames.contains("proofs")){
          const s=d.createObjectStore("proofs",{keyPath:"id"});
          s.createIndex("entry_id","entry_id");
        }
        if(!d.objectStoreNames.contains("batches")) d.createObjectStore("batches",{keyPath:"id"});
        if(!d.objectStoreNames.contains("batch_entries")){
          const s=d.createObjectStore("batch_entries",{keyPath:"id"});
          s.createIndex("batch_id","batch_id");
          s.createIndex("entry_id","entry_id");
        }
        if(!d.objectStoreNames.contains("edits")){
          const s=d.createObjectStore("edits",{keyPath:"id"});
          s.createIndex("entry_id","entry_id");
        }
        if(!d.objectStoreNames.contains("meta")) d.createObjectStore("meta",{keyPath:"k"});
      };
      rq.onsuccess=e=>{db=e.target.result;res(db);};
      rq.onerror=e=>rej(e.target.error);
    });
  }
  function tx(stores,mode="readonly"){return db.transaction(stores,mode);}
  function reqP(r){return new Promise((res,rej)=>{r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
  function getAll(store,index,query){
    const t=tx(store);const s=t.objectStore(store);
    const src=index?s.index(index):s;
    return reqP(src.getAll(query));
  }
  function get(store,key){return reqP(tx(store).objectStore(store).get(key));}
  function put(store,val){const t=tx(store,"readwrite");t.objectStore(store).put(val);return new Promise((res,rej)=>{t.oncomplete=()=>res(val);t.onerror=()=>rej(t.error);});}
  function del(store,key){const t=tx(store,"readwrite");t.objectStore(store).delete(key);return new Promise((res,rej)=>{t.oncomplete=res;t.onerror=()=>rej(t.error);});}
  function bulkPut(store,vals){const t=tx(store,"readwrite");const s=t.objectStore(store);vals.forEach(v=>s.put(v));return new Promise((res,rej)=>{t.oncomplete=res;t.onerror=()=>rej(t.error);});}
  return {open,getAll,get,put,del,bulkPut,
    getByIndex:(store,index,val)=>getAll(store,index,IDBKeyRange.only(val))};
})();

/* ============================================================
   App state
   ============================================================ */
const state = {
  tab:"home",
  companies:[],
  entries:[],
  filter:{company:null, status:null, from:null, to:null, q:""},
  defaultCurrency:"THB",
};

async function loadAll(){
  state.companies = (await DB.getAll("companies")).sort((a,b)=>a.name.localeCompare(b.name));
  // Backfill a colour + short code for any company created before they existed (one-time, stable).
  for(let i=0;i<state.companies.length;i++){ const c=state.companies[i]; let dirty=false;
    if(!c.color){ c.color=COMPANY_PALETTE[i%COMPANY_PALETTE.length]; dirty=true; }
    if(!c.code){ c.code=codeFromName(c.name); dirty=true; }
    if(dirty) await DB.put("companies",c); }
  state.entries = (await DB.getAll("entries"));
  const dc = await DB.get("meta","defaultCurrency");
  state.defaultCurrency = dc?.v || "THB";
  const cn = await DB.get("meta","claimantName");
  state.claimantName = cn?.v || "";
  const lb = await DB.get("meta","lastBackupAt");
  state.lastBackupAt = lb?.v || 0;
  // Work out whether anything changed since the last backup (for the reminder banner).
  let newest=0;
  state.entries.forEach(e=>{ newest=Math.max(newest, e.updated_at||0, e.created_at||0); });
  state.companies.forEach(c=>{ newest=Math.max(newest, c.created_at||0); });
  (await DB.getAll("batches")).forEach(b=>{ newest=Math.max(newest, b.created_at||0, b.reimbursed_at||0); });
  (await DB.getAll("batch_entries")).forEach(be=>{ newest=Math.max(newest, be.outcome_updated_at||0); });
  state.newestChange = newest;
  state.hasData = state.entries.length>0 || state.companies.length>0;
}
function companyName(id){const c=state.companies.find(c=>c.id===id);return c?c.name:"—";}

async function proofCount(entryId){const p=await DB.getByIndex("proofs","entry_id",entryId);return p.length;}

/* ============================================================
   HOME / LOG
   ============================================================ */
async function renderHome(){
  // outstanding = submitted entries. THB claim values roll into one THB figure; foreign items
  // that don't have a THB amount yet show separately in their own currency.
  const owed={};
  state.entries.filter(e=>e.status==="submitted").forEach(e=>{
    const thb=claimThb(e);
    if(thb!=null){ owed["THB"]=(owed["THB"]||0)+thb; }
    else { owed[e.currency]=(owed[e.currency]||0)+e.amount_minor; }
  });
  const figs=$("#owedFigs"), sub=$("#owedSub");
  const keys=Object.keys(owed);
  if(keys.length===0){
    figs.innerHTML=`<span class="fig zero">Nothing outstanding</span>`;
    sub.textContent="Amounts you've submitted appear here until reimbursed.";
  }else{
    figs.innerHTML=keys.map(c=>`<span class="fig">${money(owed[c],c)}</span>`).join("");
    const n=state.entries.filter(e=>e.status==="submitted").length;
    sub.textContent=`${n} entr${n===1?"y":"ies"} awaiting reimbursement.`;
  }
  renderFilters();
  renderBackupBanner();
  await renderLog();
}

function timeAgo(ts){
  if(!ts) return "";
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return "just now";
  const m=Math.floor(s/60); if(m<60) return m+" min ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  const d=Math.floor(h/24); return d+" day"+(d>1?"s":"")+" ago";
}
function backupIsDue(){ return !!(state.hasData && (state.newestChange||0) > (state.lastBackupAt||0)); }
function renderBackupBanner(){
  const el=$("#backupBanner"); if(!el) return;
  if(!backupIsDue()){ el.style.display="none"; el.innerHTML=""; return; }
  const when = state.lastBackupAt ? `since your last backup ${timeAgo(state.lastBackupAt)}` : "and you haven’t backed up yet";
  el.style.display="block";
  el.innerHTML=`<div class="bkp-inner"><span>⚠ You have changes ${when} — keep a copy off this phone.</span><button id="bkpNow">Back up</button></div>`;
  $("#bkpNow").addEventListener("click",exportBackup);
}

function renderFilters(){
  const f=$("#filters");const c=state.filter;
  const parts=[];
  parts.push(`<button class="chip ${c.company?'active':''}" data-f="company">${c.company?esc(companyName(c.company)):"All companies"} ${c.company?'<span class="x">×</span>':'▾'}</button>`);
  parts.push(`<button class="chip ${c.status?'active':''}" data-f="status">${c.status?STATUS_LABEL[c.status]:"Any status"} ${c.status?'<span class="x">×</span>':'▾'}</button>`);
  const dateLabel = (c.from||c.to) ? `${c.from?fmtDateShort(c.from):"…"} – ${c.to?fmtDateShort(c.to):"…"}` : "Any date";
  parts.push(`<button class="chip ${(c.from||c.to)?'active':''}" data-f="date">${dateLabel} ${(c.from||c.to)?'<span class="x">×</span>':'▾'}</button>`);
  f.innerHTML=parts.join("");
}

function filteredEntries(){
  const c=state.filter;
  let list=state.entries.slice();
  if(c.company) list=list.filter(e=>e.company_id===c.company);
  if(c.status) list=list.filter(e=>e.status===c.status);
  if(c.from) list=list.filter(e=>e.payment_date>=c.from);
  if(c.to) list=list.filter(e=>e.payment_date<=c.to);
  if(c.q){ const q=c.q.toLowerCase(); list=list.filter(e=>
    (e.vendor||"").toLowerCase().includes(q) ||
    (e.notes||"").toLowerCase().includes(q) ||
    (e.location_label||"").toLowerCase().includes(q) ||
    companyName(e.company_id).toLowerCase().includes(q) ||
    (e.tags||[]).some(t=>t.toLowerCase().includes(q))
  ); }
  list.sort((a,b)=> b.payment_date.localeCompare(a.payment_date) || b.created_at-a.created_at );
  return list;
}

// Amount shown on a Log row. Foreign entries show native → THB claim (or → ⚠ ฿??? if not set yet).
function amountMainHTML(e){
  if(e.type==='travel' && e.amount_minor===0) return '—';
  const native = money(e.amount_minor, e.currency);
  if(e.currency==="THB") return native;
  if(e.claim_thb_minor!=null) return `${native} <span class="amt-conv">→ ${money(e.claim_thb_minor,"THB")}</span>`;
  return `${native} <span class="amt-need">→ ⚠ ฿???</span>`;
}
function logRowHTML(e, noProof){
  const showNoProof = noProof && !(e.type==='travel' && e.amount_minor===0);
  const curLine = (e.type==='travel'&&e.amount_minor===0)
    ? `<span class="st-word-${e.status}">${STATUS_LABEL[e.status]}</span>`
    : `${e.currency} · <span class="st-word-${e.status}">${STATUS_LABEL[e.status]}</span>`;
  const tags = (e.tags&&e.tags.length)
    ? `<div class="row-tags">${[...e.tags].sort((a,b)=>a.localeCompare(b)).slice(0,4).map(esc).join(", ")}${e.tags.length>4?`, +${e.tags.length-4}`:""}</div>` : "";
  return `<div class="row" data-id="${e.id}">
      <div class="accent st-${e.status}"></div>
      ${showNoProof?`<span class="noproof-top">⚠ no proof</span>`:""}
      <div class="body">
        <div class="rline1">
          <div class="vendor">${esc(e.vendor||e.location_label||companyName(e.company_id))}</div>
          <div class="amt-main">${amountMainHTML(e)}</div>
        </div>
        <div class="rline2">
          <div class="meta"><span class="type-badge type-${e.type}">${e.type}</span><span class="co-dot" style="background:${companyColor(e.company_id)}"></span>${esc(companyName(e.company_id))}</div>
          <div class="cur">${curLine}</div>
        </div>
        ${tags}
      </div>
    </div>`;
}
async function renderLog(){
  const list=filteredEntries();
  const log=$("#log");
  if(list.length===0){
    const anyEntries=state.entries.length>0;
    log.innerHTML=`<div class="empty"><h3>${anyEntries?"No matches":"No entries yet"}</h3><p>${anyEntries?"Try clearing a filter.":"Tap + to log your first expense."}</p></div>`;
    return;
  }
  const allProofs=await DB.getAll("proofs");
  const pc={};allProofs.forEach(p=>pc[p.entry_id]=(pc[p.entry_id]||0)+1);
  let html="", lastDay=null, open=false, firstInGroup=false;
  for(const e of list){
    if(e.payment_date!==lastDay){
      if(open) html+=`</div>`;                 // close previous day-group
      lastDay=e.payment_date;
      html+=`<div class="day-head">${fmtDate(e.payment_date)}</div><div class="day-group">`;
      open=true; firstInGroup=true;
    }
    if(!firstInGroup) html+=`<div class="row-div"></div>`;  // inset divider between same-day rows
    firstInGroup=false;
    html+=logRowHTML(e, !pc[e.id]);
  }
  if(open) html+=`</div>`;
  log.innerHTML=html;
}

/* ============================================================
   Screens manager
   ============================================================ */
function openScreen(title,bodyHTML,rightHTML=""){
  const wrap=document.createElement("div");
  wrap.className="screen";
  wrap.innerHTML=`
    <div class="screen-head">
      <button class="back">‹ Back</button>
      <h2>${esc(title)}</h2>
      <div class="right">${rightHTML}</div>
    </div>
    <div class="screen-body">${bodyHTML}</div>`;
  $("#screens").appendChild(wrap);
  requestAnimationFrame(()=>wrap.classList.add("show"));
  wrap.querySelector(".back").addEventListener("click",()=>closeScreen(wrap));
  return wrap;
}
function closeScreen(wrap){wrap.classList.remove("show");setTimeout(()=>{wrap.remove();syncFormOpen();},240);}
function closeTopScreen(){const s=$$("#screens .screen");if(s.length)closeScreen(s[s.length-1]);}
function syncFormOpen(){ document.body.classList.toggle("form-open", !!$("#screens .screen.is-form")); }

/* ---------- bottom sheet ---------- */
function openSheet(html){$("#sheet").innerHTML=html;$("#sheetBack").classList.add("show");}
function closeSheet(){$("#sheetBack").classList.remove("show");}
$("#sheetBack").addEventListener("click",e=>{if(e.target.id==="sheetBack")closeSheet();});

/* choose from a list via sheet, returns via callback */
function chooseSheet(title,options,current,onPick,extra=""){
  const html=`<h3>${esc(title)}</h3><div class="list-choice">${
    options.map(o=>`<button data-v="${esc(o.value)}">${esc(o.label)} ${o.value===current?'<span class="check">✓</span>':''}</button>`).join("")
  }</div>${extra}`;
  openSheet(html);
  $$("#sheet .list-choice button").forEach(b=>b.addEventListener("click",()=>{closeSheet();onPick(b.dataset.v);}));
}

// Company to pre-select for a new entry: the one used on the most recent
// entry (falls back to the first company if there are no entries yet).
function lastUsedCompanyId(){
  const ids=new Set(state.companies.map(c=>c.id));
  let best=null,bestT=-Infinity;
  (state.entries||[]).forEach(e=>{const t=e.created_at||0; if(t>bestT && ids.has(e.company_id)){bestT=t;best=e.company_id;}});
  return best || state.companies[0]?.id || null;
}
function newDraft(){
  return {id:uid(), company_id:lastUsedCompanyId(), type:"expense",
    amount_minor:null, amount_str:"", currency:state.defaultCurrency, vendor:"",
    claim_thb_minor:null, claim_thb_str:"",
    payment_date:todayISO(), notes:"", tags:[],
    location_lat:null, location_lng:null, location_label:"",
    status:"unclaimed", _proofs:[], _isNew:true};
}

let draft=null;

async function openAddEntry(existing){
  if(state.companies.length===0){
    toast("Add a company first");
    openCompanies(true);
    return;
  }
  if(existing){
    draft={...existing, amount_str:(existing.amount_minor/100).toString(), claim_thb_str:(existing.claim_thb_minor!=null?(existing.claim_thb_minor/100).toString():""), tags:[...(existing.tags||[])], _proofs:[], _isNew:false};
    const proofs=await DB.getByIndex("proofs","entry_id",existing.id);
    draft._proofs=proofs.map(p=>({id:p.id, file_type:p.file_type, name:p.name, blob:p.blob, _existing:true}));
  }else{
    draft=newDraft();
  }
  const allTags=(await DB.getAll("tags")).map(t=>t.name);
  renderEntryFormCompact(allTags, !!existing);
}

function wireEntryForm(screen, allTags, isEdit){
  const d=draft;
  const q=s=>screen.querySelector(s);

  q("#pickCompany").addEventListener("click",()=>{
    chooseSheet("Company",
      state.companies.map(c=>({value:c.id,label:c.name})),
      d.company_id,
      v=>{ d.company_id=v;
        const c=state.companies.find(x=>x.id===v);
        if(c?.default_currency){d.currency=c.default_currency;q("#currency").value=c.default_currency;}
        q("#pickCompany").textContent=companyName(v)+" ▾";
      });
  });

  function applyTypeUI(){
    const isTravel=d.type==="travel";
    q("#locField").classList.toggle("hidden", !isTravel);
    q("#vendorField").classList.toggle("hidden", isTravel);
    q("#tagsField").classList.toggle("hidden", isTravel);
    q("#notesField").classList.toggle("hidden", isTravel);
    q("#amountLabel").innerHTML = isTravel ? 'Toll fees <span class="opt">(optional)</span>' : 'Amount <span class="req">*</span>';
    q("#amount").placeholder = isTravel ? "0.00 (optional)" : "0.00";
  }
  q("#typeSeg").addEventListener("click",e=>{
    const b=e.target.closest("button");if(!b)return;
    d.type=b.dataset.t;
    $$("#typeSeg button",screen).forEach(x=>x.classList.toggle("on",x===b));
    applyTypeUI();
  });

  q("#pinBtn")?.addEventListener("click",()=>{
    if(!navigator.geolocation){toast("Geolocation not available");return;}
    q("#locCoords").textContent="Locating…";
    navigator.geolocation.getCurrentPosition(
      pos=>{d.location_lat=pos.coords.latitude;d.location_lng=pos.coords.longitude;
        q("#locCoords").textContent=`${d.location_lat.toFixed(5)}, ${d.location_lng.toFixed(5)}`;
        toast("Location pinned");},
      err=>{q("#locCoords").textContent="Couldn't get location";toast("Location permission denied");},
      {enableHighAccuracy:true,timeout:10000}
    );
  });

  q("#tagList").addEventListener("click",e=>{
    const b=e.target.closest(".tag");if(!b)return;
    if(b.id==="addTag"){
      openSheet(`<h3>New tag</h3><div class="field"><input type="text" id="newTagName" placeholder="Tag name" autofocus></div><button class="btn btn-primary" id="newTagSave">Add tag</button>`);
      $("#newTagSave").addEventListener("click",async()=>{
        const name=$("#newTagName").value.trim();if(!name){closeSheet();return;}
        await DB.put("tags",{name});
        if(!d.tags.includes(name))d.tags.push(name);
        closeSheet();
        // re-render tag list
        const tags=(await DB.getAll("tags")).map(t=>t.name);
        const tl=q("#tagList");
        tl.innerHTML=tags.map(t=>`<button class="tag ${d.tags.includes(t)?'on':''}" data-tag="${esc(t)}">${esc(t)}</button>`).join("")+`<button class="tag add" id="addTag">+ New tag</button>`;
      });
      return;
    }
    const t=b.dataset.tag;
    if(d.tags.includes(t))d.tags=d.tags.filter(x=>x!==t);else d.tags.push(t);
    b.classList.toggle("on");
  });

  // proofs
  const fileInput=q("#fileInput");
  function renderProofs(){
    const pl=q("#proofList");
    pl.innerHTML=d._proofs.map((p,i)=>{
      const isImg=p.file_type&&p.file_type.startsWith("image");
      const url=isImg?URL.createObjectURL(p.blob):null;
      return `<div class="proof-thumb">${isImg?`<img src="${url}">`:`<span class="pdf">PDF</span>`}<span class="del" data-i="${i}">×</span></div>`;
    }).join("")+`<button class="add-proof" id="addProof"><span class="plus">+</span>Add</button>`;
    q("#addProof").addEventListener("click",()=>fileInput.click());
    $$(".proof-thumb .del",pl).forEach(x=>x.addEventListener("click",()=>{d._proofs.splice(+x.dataset.i,1);renderProofs();}));
  }
  fileInput.addEventListener("change",()=>{
    const files=[...fileInput.files];
    fileInput.value="";
    ingestProofs(files, renderProofs);
  });
  renderProofs();

  q("#saveEntry").addEventListener("click",()=>collectAndSave(screen,isEdit));
  q("#deleteEntry")?.addEventListener("click",()=>confirmDelete(d.id,screen));
}

function readForm(screen){
  const q=s=>screen.querySelector(s);
  const d=draft;
  d.amount_str=q("#amount").value.trim();
  d.currency=q("#currency").value;
  d.vendor=q("#vendor").value.trim();
  d.payment_date=q("#payDate").value;
  d.notes=q("#notes").value.trim();
  d.location_label=q("#locLabel")?.value.trim()||"";
}

async function collectAndSave(screen,isEdit){
  readForm(screen);
  const d=draft;
  const isTravel=d.type==='travel';
  const amt=parseFloat(d.amount_str);
  if(!d.company_id){toast("Choose a company");return;}
  if(isTravel){
    if(d.location_lat==null){toast("Pin a location for travel");return;}
    d.amount_minor=(amt&&amt>0)?Math.round(amt*100):0;
    d.vendor="";d.notes="";d.tags=[];
  }else{
    if(!amt||amt<=0){toast("Enter an amount");return;}
    d.amount_minor=Math.round(amt*100);
    d.location_lat=null;d.location_lng=null;d.location_label="";
  }
  if(!d.payment_date){toast("Choose a date");return;}

  if(isEdit){ await saveEntry(isEdit); closeScreen(screen); return; }

  // NEW → show summary/confirm screen first
  showSummary(screen);
}

function showSummary(formScreen){
  const d=draft;
  const isTravel=d.type==="travel";
  const amountRow = isTravel
    ? ["Toll fees", d.amount_minor>0?money(d.amount_minor,d.currency):"No toll", true]
    : ["Amount", money(d.amount_minor,d.currency), true];
  const rows=[
    ["Company", companyName(d.company_id)],
    ["Type", d.type[0].toUpperCase()+d.type.slice(1)],
    isTravel&&d.location_lat!=null?["Location",(d.location_label?d.location_label+" · ":"")+`${d.location_lat.toFixed(4)}, ${d.location_lng.toFixed(4)}`]:null,
    amountRow,
    d.vendor?["Vendor",d.vendor]:null,
    ["Date", fmtDate(d.payment_date)],
    d.tags.length?["Tags",d.tags.join(", ")]:null,
    d.notes?["Notes",d.notes]:null,
    ["Proof", d._proofs.length?`${d._proofs.length} file${d._proofs.length>1?"s":""}`:"⚠ none attached"],
  ].filter(Boolean);
  const body=`
    <div class="summary">
      ${rows.map(r=>`<div class="srow"><span class="k">${esc(r[0])}</span><span class="v ${r[2]?'big mono':''}">${esc(r[1])}</span></div>`).join("")}
    </div>
    ${d._proofs.length===0?`<div class="warn">No payment proof attached. You can still save and add it later.</div>`:""}
    <button class="btn btn-primary" id="confirmSave">Confirm & save</button>
    <button class="btn btn-ghost" id="backEdit" style="margin-top:10px;">Back to edit</button>
  `;
  const sc=openScreen("Review", body);
  sc.querySelector("#confirmSave").addEventListener("click",async()=>{
    await saveEntry(false);
    closeScreen(sc);
    closeScreen(formScreen);
    toast("Entry saved");
  });
  sc.querySelector("#backEdit").addEventListener("click",()=>closeScreen(sc));
}

async function saveEntry(isEdit){
  const d=draft;
  const now=Date.now();
  let changes=null;
  if(isEdit){
    const before=state.entries.find(e=>e.id===d.id);
    changes={};
    const fields=["amount_minor","currency","claim_thb_minor","vendor","payment_date","notes","company_id","type","location_label"];
    fields.forEach(f=>{ if((before[f]??"")!==(d[f]??"")) changes[f]=[before[f],d[f]]; });
    if(JSON.stringify((before.tags||[]).sort())!==JSON.stringify([...d.tags].sort())) changes.tags=[before.tags||[],d.tags];
  }
  const claimRaw = (d.claim_thb_str||"").replace(/,/g,"").trim();
  const claim_thb_minor = (d.currency!=="THB" && claimRaw!=="" && !isNaN(parseFloat(claimRaw)))
    ? Math.round(parseFloat(claimRaw)*100) : null;
  const rec={
    id:d.id, company_id:d.company_id, type:d.type,
    amount_minor:d.amount_minor, currency:d.currency, claim_thb_minor,
    vendor:d.vendor, payment_date:d.payment_date, notes:d.notes, tags:d.tags,
    location_lat:d.location_lat, location_lng:d.location_lng, location_label:d.location_label,
    status:d.status||"unclaimed",
    created_at:d._isNew?now:(state.entries.find(e=>e.id===d.id)?.created_at||now),
    updated_at:now,
  };
  await DB.put("entries",rec);

  // proofs: delete removed existing, add new
  const existingProofs=await DB.getByIndex("proofs","entry_id",d.id);
  const keepIds=new Set(d._proofs.filter(p=>p._existing).map(p=>p.id));
  for(const p of existingProofs){ if(!keepIds.has(p.id)) await DB.del("proofs",p.id); }
  for(const p of d._proofs){ if(!p._existing){ await DB.put("proofs",{id:p.id,entry_id:d.id,blob:p.blob,file_type:p.file_type,name:p.name,added_at:now}); } }

  // edit log
  if(isEdit && changes && Object.keys(changes).length){
    const reason = await askEditReason();
    await DB.put("edits",{id:uid(),entry_id:d.id,edited_at:now,changes,reason:reason||null});
  }

  await loadAll();
  refreshCurrent();
}

function askEditReason(){
  return new Promise(res=>{
    openSheet(`<h3>What changed? <span style="font-weight:400;color:var(--slate);font-size:14px;">(optional)</span></h3>
      <div class="field"><input type="text" id="reasonInput" placeholder="e.g. corrected amount from receipt"></div>
      <button class="btn btn-primary" id="reasonSave">Save</button>
      <button class="btn btn-ghost" id="reasonSkip" style="margin-top:10px;">Skip</button>`);
    $("#reasonSave").addEventListener("click",()=>{const v=$("#reasonInput").value.trim();closeSheet();res(v);});
    $("#reasonSkip").addEventListener("click",()=>{closeSheet();res("");});
  });
}

function confirmDelete(id,screen){
  openSheet(`<h3>Delete this entry?</h3><p class="hint" style="margin-bottom:16px;">This removes the entry and its proof files from this device. It can't be undone.</p>
    <button class="btn btn-danger" id="delYes">Delete</button>
    <button class="btn btn-ghost" id="delNo" style="margin-top:10px;">Cancel</button>`);
  $("#delYes").addEventListener("click",async()=>{
    const proofs=await DB.getByIndex("proofs","entry_id",id);
    for(const p of proofs) await DB.del("proofs",p.id);
    await DB.del("entries",id);
    await loadAll();
    refreshCurrent();
    closeSheet();
    if(screen) closeScreen(screen);
    toast("Entry deleted");
  });
  $("#delNo").addEventListener("click",closeSheet);
}

function wireCompactForm(screen,isEdit){
  const d=draft;const q=s=>screen.querySelector(s);
  function applyType(){
    const isTravel=d.type==="travel";
    q("#cVendorCell").classList.toggle("hidden",isTravel);
    q("#cNotesCell").classList.toggle("hidden",isTravel);
    q("#cTagsCell").classList.toggle("hidden",isTravel);
    q("#cLocCell").classList.toggle("hidden",!isTravel);
    q("#cAmtLabel").innerHTML=isTravel?'Toll <span class="opt">(opt)</span>':'Amount <span class="req">*</span>';
    q("#cAmount").placeholder=isTravel?"0.00 (optional)":"0.00";
  }
  // Tag usage stats for the picker's sort options.
  const tagFreq={}, tagLastUsed={};
  (state.entries||[]).forEach(e=>{ const t=e.created_at||0; (e.tags||[]).forEach(tag=>{ tagFreq[tag]=(tagFreq[tag]||0)+1; tagLastUsed[tag]=Math.max(tagLastUsed[tag]||0,t); }); });
  let tagSort="used";
  function tagsSorted(query){
    let list=Array.from(new Set(cfTags));
    if(query){ const ql=query.toLowerCase(); list=list.filter(t=>t.toLowerCase().includes(ql)); }
    if(tagSort==="alpha") list.sort((a,b)=>a.localeCompare(b));
    else if(tagSort==="recent") list.sort((a,b)=>((tagLastUsed[b]||0)-(tagLastUsed[a]||0))||a.localeCompare(b));
    else list.sort((a,b)=>((tagFreq[b]||0)-(tagFreq[a]||0))||a.localeCompare(b));
    return list;
  }
  function renderTags(){ // shows the chosen tags in the form + opens the picker
    const el=q("#cTagsSelected");
    if(!d.tags.length){ el.innerHTML=`<span class="tag-empty">No tags yet</span>`; return; }
    el.innerHTML=[...d.tags].sort((a,b)=>a.localeCompare(b)).map(t=>`<button type="button" class="tag on" data-tag="${esc(t)}">${esc(t)} ×</button>`).join("");
    $$("#cTagsSelected .tag",screen).forEach(b=>b.addEventListener("click",()=>{ d.tags=d.tags.filter(x=>x!==b.dataset.tag); renderTags(); }));
  }
  function renderPickerList(){
    const s=document.querySelector("#tpSearch");
    const list=tagsSorted(s?s.value.trim():"");
    const wrap=document.querySelector("#tpList");
    wrap.innerHTML=list.length

        ${edits.map(ed=>`<div class="e"><strong>${fmtDateTime(ed.edited_at)}</strong> — ${esc(summarizeChanges(ed.changes))}${ed.reason?`<br><em>“${esc(ed.reason)}”</em>`:""}</div>`).join("")}

function fmtDateTime(ts){const d=new Date(ts);const dd=String(d.getDate()).padStart(2,"0");const mm=String(d.getMonth()+1).padStart(2,"0");return `${dd}/${mm}/${d.getFullYear()}, `+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});}
function summarizeChanges(ch){
  const names={amount_minor:"amount",currency:"currency",vendor:"vendor",payment_date:"date",notes:"notes",company_id:"company",type:"type",location_label:"location",tags:"tags"};
  return Object.keys(ch).map(k=>{
    if(k==="amount_minor")return `amount → changed`;
    if(k==="company_id")return `company → changed`;
    if(k==="tags")return `tags → changed`;
    return `${names[k]||k} → changed`;
  }).join(", ");
}

/* ============================================================
   CLAIM builder
   ============================================================ */
const claimState={company:null, from:null, to:null, showAll:false, selected:new Set()};

function openClaim(){
  if(state.companies.length===0){toast("Add a company first");openCompanies(true);return;}
  claimState.company=claimState.company||state.companies[0].id;
  claimState.from=claimState.from||firstOfMonth();
  claimState.to=claimState.to||todayISO();
  claimState.selected=new Set();
  renderClaim();
}
function firstOfMonth(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;}

function claimCandidates(){
  return state.entries.filter(e=>
    e.company_id===claimState.company &&
    e.payment_date>=claimState.from && e.payment_date<=claimState.to &&
    (claimState.showAll || e.status==="unclaimed")
  ).sort((a,b)=>a.payment_date.localeCompare(b.payment_date));
}

async function renderClaim(){
  const list=claimCandidates();
  // default select all unclaimed candidates
  if(claimState.selected.size===0){ list.forEach(e=>{ if(e.status==="unclaimed") claimState.selected.add(e.id); }); }

  const allProofs=await DB.getAll("proofs");
  const pc={};allProofs.forEach(p=>pc[p.entry_id]=1);

  const rows=list.map(e=>{
    const sel=claimState.selected.has(e.id);
    const noProof=!pc[e.id];
    return `<div class="claim-row ${sel?'sel':''}" data-id="${e.id}">
      <div class="cbox">${sel?'✓':''}</div>
      <div class="info">
        <div class="t">${esc(e.vendor||companyName(e.company_id))} ${noProof?'<span class="noproof">⚠</span>':''}</div>
        <div class="s">${fmtDateShort(e.payment_date)} · ${STATUS_LABEL[e.status]}${e.status!=="unclaimed"?" (already)":""}</div>
      </div>
      <div class="a">${amountMainHTML(e)}</div>
    </div>`;
  }).join("");

  // totals for selected — THB claim values roll into THB; foreign items without a THB amount
  // are flagged and shown in native currency.
  const tot={};let noProofCount=0, needThbCount=0;
  list.forEach(e=>{if(claimState.selected.has(e.id)){
    const thb=claimThb(e);
    if(thb!=null){ tot["THB"]=(tot["THB"]||0)+thb; }
    else { needThbCount++; tot[e.currency]=(tot[e.currency]||0)+e.amount_minor; }
    if(!pc[e.id])noProofCount++;
  }});
  const totKeys=Object.keys(tot);
  const selCount=claimState.selected.size;

  const body=`
    <div class="field"><label>Company</label>
      <button id="claimCompany" style="width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:var(--surface);color:var(--ink);font-size:16px;display:flex;justify-content:space-between;align-items:center;">${esc(companyName(claimState.company))} <span style="color:var(--slate);">▾</span></button></div>
    <div style="display:flex;gap:10px;">
      <div class="field" style="flex:1;"><label>From</label><input type="date" id="claimFrom" value="${claimState.from}"></div>
      <div class="field" style="flex:1;"><label>To</label><input type="date" id="claimTo" value="${claimState.to}"></div>
    </div>
    <label class="tag ${claimState.showAll?'on':''}" id="showAllToggle" style="display:inline-block;margin-bottom:14px;">${claimState.showAll?'✓ ':''}Show already-claimed too</label>

    ${list.length===0?`<div class="empty"><h3>Nothing to claim</h3><p>No ${claimState.showAll?"":"unclaimed "}entries for this company in range.</p></div>`
    :`<div id="claimRows">${rows}</div>`}
  `;

  const foot = list.length? `` : "";
  const sc=openScreen("Build claim", body);

  // sticky total bar appended to body
  if(list.length){
    const bar=document.createElement("div");
    bar.className="totbar";
    bar.innerHTML=`
      ${needThbCount>0?`<div class="warn">⚠ ${needThbCount} foreign item${needThbCount>1?"s":""} need a THB claim amount before this can be generated</div>`:""}
      ${noProofCount>0?`<div class="warn">⚠ ${noProofCount} of ${selCount} selected ${selCount===1?"entry has":"entries have"} no proof</div>`:""}
      <div class="tot-figs">${totKeys.length?totKeys.map(c=>`<span class="tf">${money(tot[c],c)}</span>`).join(""):'<span class="tf" style="color:var(--slate)">Nothing selected</span>'}</div>
      <button class="btn btn-primary" id="genBtn" ${selCount===0?"disabled":""}>Generate claim · ${selCount} item${selCount!==1?"s":""}</button>`;
    sc.querySelector(".screen-body").appendChild(bar);
    sc.querySelector("#genBtn").addEventListener("click",()=>generateBatch(list,sc));
  }

  // wire
  sc.querySelector("#claimCompany").addEventListener("click",()=>{
    chooseSheet("Company",state.companies.map(c=>({value:c.id,label:c.name})),claimState.company,v=>{
      claimState.company=v;claimState.selected=new Set();closeScreen(sc);renderClaim();
    });
  });
  sc.querySelector("#claimFrom")?.addEventListener("change",e=>{claimState.from=e.target.value;claimState.selected=new Set();closeScreen(sc);renderClaim();});
  sc.querySelector("#claimTo")?.addEventListener("change",e=>{claimState.to=e.target.value;claimState.selected=new Set();closeScreen(sc);renderClaim();});
  sc.querySelector("#showAllToggle")?.addEventListener("click",()=>{claimState.showAll=!claimState.showAll;claimState.selected=new Set();closeScreen(sc);renderClaim();});
  sc.querySelectorAll(".claim-row").forEach(r=>r.addEventListener("click",()=>{
    const id=r.dataset.id;
    if(claimState.selected.has(id))claimState.selected.delete(id);else claimState.selected.add(id);
    closeScreen(sc);renderClaim();
  }));
}

async function generateBatch(list,screen){
  const selected=list.filter(e=>claimState.selected.has(e.id));
  if(selected.length===0)return;
  // Claims are in THB — every foreign item needs a THB claim amount before it can go in.
  const needThb=selected.filter(e=>claimThb(e)===null);
  if(needThb.length){ toast(`${needThb.length} foreign item${needThb.length>1?"s":""} still need a THB claim amount`); return; }
  const now=Date.now();
  const batchId=uid();
  const batch={id:batchId, company_id:claimState.company, submitted_date:todayISO(),
    range_start:claimState.from, range_end:claimState.to, note:"", created_at:now,
    claim_no: await nextClaimNo(claimState.company)};
  await DB.put("batches",batch);
  for(const e of selected){
    const thb=claimThb(e);   // THB claim value; foreign items are converted, original kept for reference
    await DB.put("batch_entries",{id:uid(),batch_id:batchId,entry_id:e.id,
      amount_minor_snapshot: thb!=null?thb:e.amount_minor,
      currency_snapshot: thb!=null?"THB":e.currency,
      original_amount_minor:e.amount_minor, original_currency:e.currency,
      vendor_snapshot:e.vendor||companyName(e.company_id), date_snapshot:e.payment_date,
      outcome:"pending",outcome_updated_at:null});
    e.status="submitted"; await DB.put("entries",e);
  }
  await loadAll();
  closeScreen(screen);
  claimState.selected=new Set();
  // offer CSV
  exportBatchCSV(batchId);
  toast(`Claim created · ${selected.length} items marked submitted`);
  setTimeout(()=>openBatchDetail(batchId),300);
}

async function openBatchesTab(){
  const batches=(await DB.getAll("batches")).sort((a,b)=>b.created_at-a.created_at);
  const bes=await DB.getAll("batch_entries");
  const byBatch={};bes.forEach(be=>{(byBatch[be.batch_id]=byBatch[be.batch_id]||[]).push(be);});

  let body;
  if(batches.length===0){
    body=`<div class="empty"><h3>No claims yet</h3><p>Build a claim from the Claim tab to submit expenses together.</p></div>`;
  }else{
    body=batches.map(b=>{
      const items=byBatch[b.id]||[];
      const tot={};items.forEach(i=>tot[i.currency_snapshot]=(tot[i.currency_snapshot]||0)+i.amount_minor_snapshot);
      const pending=items.filter(i=>i.outcome==="pending").length;
      const reimbursed=items.filter(i=>i.outcome==="reimbursed").length;
      const rejected=items.filter(i=>i.outcome==="rejected").length;
      let statusTag,cls;
      if(pending>0){statusTag="Outstanding";cls="st-submitted-c";}
      else if(rejected>0&&reimbursed>0){statusTag="Partly reimbursed";cls="st-submitted-c";}
      else if(reimbursed>0){statusTag="Reimbursed";cls="st-reimbursed-c";}
      else{statusTag="Closed";cls="st-unclaimed-c";}
      return `<div class="batch-card" data-id="${b.id}">
        <div class="bh"><span class="bt">${esc(companyName(b.company_id))}</span><span class="bd">${fmtDateShort(b.submitted_date)}</span></div>
        <div class="bd mono" style="margin-top:2px;font-weight:600;color:var(--ink-soft);">${esc(b.claim_no||"")}</div>
        <div class="bd" style="margin-top:3px;">${fmtDateShort(b.range_start)} – ${fmtDateShort(b.range_end)} · ${items.length} item${items.length!==1?"s":""}</div>
        <div style="margin-top:8px;font-family:var(--mono);font-weight:600;">${Object.keys(tot).map(c=>money(tot[c],c)).join("  ·  ")}</div>
        <div class="bstat"><span class="mini-tag ${cls}">${statusTag}</span>
          ${pending?`<span class="mini-tag st-submitted-c">${pending} pending</span>`:""}
          ${reimbursed?`<span class="mini-tag st-reimbursed-c">${reimbursed} paid</span>`:""}
          ${rejected?`<span class="mini-tag st-rejected-c">${rejected} rejected</span>`:""}
        </div>
      </div>`;
    }).join("");
  }
  const sc=openScreen("Claims", body);
  sc.querySelectorAll(".batch-card").forEach(c=>c.addEventListener("click",()=>{closeScreen(sc);setTimeout(()=>openBatchDetail(c.dataset.id),260);}));
}

async function openBatchDetail(batchId){
  const batch=await DB.get("batches",batchId);if(!batch)return;
  const items=(await DB.getByIndex("batch_entries","batch_id",batchId));
  const tot={};items.forEach(i=>tot[i.currency_snapshot]=(tot[i.currency_snapshot]||0)+i.amount_minor_snapshot);

  const rows=items.map(be=>{
    const oc=be.outcome;
    const ocClass={pending:"st-submitted-c",reimbursed:"st-reimbursed-c",rejected:"st-rejected-c"}[oc];
    const ocLabel={pending:"Pending",reimbursed:"Reimbursed",rejected:"Rejected → unclaimed"}[oc];
    return `<div class="claim-row" data-be="${be.id}" data-entry="${be.entry_id}" style="cursor:pointer;">
      <div class="info">
        <div class="t">${esc(be.vendor_snapshot)}</div>
        <div class="s">${fmtDateShort(be.date_snapshot)} · <span class="mini-tag ${ocClass}">${ocLabel}</span></div>
      </div>
      <div class="a">${money(be.amount_minor_snapshot,be.currency_snapshot)}</div>
    </div>`;
  }).join("");

  const pendingCount=items.filter(i=>i.outcome==="pending").length;
  const reimbursedCount=items.filter(i=>i.outcome==="reimbursed").length;

  const reimbInfo = batch.reimbursed_date
    ? `<div class="r"><span class="k">Reimbursed on</span><span class="v">${fmtDate(batch.reimbursed_date)}</span></div>` : "";
  const slipBlock = batch.reimburse_proof
    ? `<div class="section-label">Payment slip</div>
       <div class="proofs"><div class="proof-thumb" id="rbSlipThumb" style="cursor:pointer;"><img src="${batch.reimburse_proof}"></div></div>
       <div class="hint" style="margin-bottom:6px;">Tap the slip to view full size.</div>` : "";

  let actionBtn="";
  if(pendingCount>0){
    actionBtn+=`<button class="btn btn-ghost" id="allPaid" style="margin-top:10px;">Mark all pending as reimbursed</button>`;
  }else if(reimbursedCount>0){
    actionBtn+=`<button class="btn btn-ghost" id="undoReimb" style="margin-top:10px;color:var(--danger);">Undo reimbursement</button>`;
  }

// Batch-level reimbursement: capture the date + an optional payment-slip photo,
// then mark all pending items reimbursed. Slip is stored as a base64 data URL on
// the batch record so it travels inside JSON backups.
function reimburseBatchSheet(batchId,items,sc){
  openSheet(`<h3>Mark batch reimbursed</h3>
    <div class="field nomb" style="margin-bottom:12px;">
      <label>Reimbursement date <span class="req">*</span></label>
      <input type="date" id="rbDate" value="${todayISO()}" max="${todayISO()}">
    </div>
    <div class="field nomb" style="margin-bottom:14px;">
      <label>Payment slip <span class="opt">(optional)</span></label>
      <div id="rbProofWrap"><button class="btn btn-ghost btn-sm" id="rbPick">Upload slip image</button></div>
      <input type="file" id="rbFile" accept="image/*" capture="environment" class="hidden">
    </div>
    <button class="btn btn-primary" id="rbConfirm">Confirm reimbursed</button>
    <button class="btn btn-ghost" id="rbCancel" style="margin-top:10px;">Cancel</button>`);
  let slipUrl=null, slipType=null;
  const q=s=>document.querySelector(s);
  q("#rbPick").addEventListener("click",()=>q("#rbFile").click());
  q("#rbFile").addEventListener("change",function(){
    const f=this.files&&this.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{ slipUrl=String(r.result); slipType=f.type; q("#rbProofWrap").innerHTML=`<div class="proofs"><div class="proof-thumb"><img src="${slipUrl}"></div></div>`; };
    r.readAsDataURL(f);
  });
  q("#rbCancel").addEventListener("click",closeSheet);
  q("#rbConfirm").addEventListener("click",async()=>{
    const date=q("#rbDate").value;
    if(!date){ toast("Choose a date"); return; }
    const batch=await DB.get("batches",batchId);
    batch.reimbursed_date=date; batch.reimbursed_at=Date.now();
    batch.reimburse_proof=slipUrl; batch.reimburse_proof_type=slipType;
    await DB.put("batches",batch);
    for(const be of items){ if(be.outcome==="pending"){ be.outcome="reimbursed"; be.outcome_updated_at=Date.now(); await DB.put("batch_entries",be);
      const e=state.entries.find(x=>x.id===be.entry_id); if(e){ e.status="reimbursed"; await DB.put("entries",e); } } }
    await loadAll(); refreshCurrent(); closeSheet(); closeScreen(sc); setTimeout(()=>openBatchDetail(batchId),260); toast("Batch marked reimbursed");
  });
}

function undoReimbursement(batchId,sc){
  openSheet(`<h3>Undo reimbursement?</h3>
    <p class="hint" style="margin-bottom:14px;">Reverts reimbursed items in this batch back to Pending (entries return to Submitted) and clears the reimbursement date and slip, so you can revise and re-confirm.</p>
    <button class="btn btn-danger" id="undoYes">Undo reimbursement</button>
    <button class="btn btn-ghost" id="undoNo" style="margin-top:10px;">Cancel</button>`);
  document.querySelector("#undoNo").addEventListener("click",closeSheet);
  document.querySelector("#undoYes").addEventListener("click",async()=>{
    const batch=await DB.get("batches",batchId);
    delete batch.reimbursed_date; delete batch.reimbursed_at; delete batch.reimburse_proof; delete batch.reimburse_proof_type;
    await DB.put("batches",batch);
    const items=await DB.getByIndex("batch_entries","batch_id",batchId);
    for(const be of items){ if(be.outcome==="reimbursed"){ be.outcome="pending"; be.outcome_updated_at=Date.now(); await DB.put("batch_entries",be);
      const e=state.entries.find(x=>x.id===be.entry_id); if(e){ e.status="submitted"; await DB.put("entries",e); } } }
    await loadAll(); refreshCurrent(); closeSheet(); closeScreen(sc); setTimeout(()=>openBatchDetail(batchId),260); toast("Reimbursement undone");
  });
}

// Cancel a claim that has NOT been reimbursed: return every item to Unclaimed and delete
// the batch entirely. Only offered when no item is reimbursed.
function cancelClaim(batchId,sc){
  openSheet(`<h3>Cancel this claim?</h3>
    <p class="hint" style="margin-bottom:14px;">All items go back to <strong>Unclaimed</strong> and this claim is <strong>deleted</strong>. Nothing here has been reimbursed, so no payment record is lost. This can't be undone.</p>
    <button class="btn btn-danger" id="cancelYes">Cancel claim &amp; delete</button>
    <button class="btn btn-ghost" id="cancelNo" style="margin-top:10px;">Keep claim</button>`);
  document.querySelector("#cancelNo").addEventListener("click",closeSheet);
  document.querySelector("#cancelYes").addEventListener("click",async()=>{
    const items=await DB.getByIndex("batch_entries","batch_id",batchId);
    for(const be of items){
      const e=state.entries.find(x=>x.id===be.entry_id);
      if(e){ e.status="unclaimed"; await DB.put("entries",e); }
      await DB.del("batch_entries",be.id);
    }
    await DB.del("batches",batchId);
    await loadAll(); refreshCurrent(); closeSheet(); closeScreen(sc); toast("Claim cancelled");
  });
}

async function itemOutcomeSheet(beId,entryId,batchId){
  const cur=(await DB.get("batch_entries",beId))?.outcome;
  const opts=[
    {o:"reimbursed",label:"Reimbursed"},
    {o:"rejected",label:"Rejected — send back to Unclaimed"},
    {o:"pending",label:"Reset to Pending"},
  ];
  openSheet(`<h3>Update item</h3>
    <div class="list-choice">
      ${opts.map(x=>x.o===cur
        ? `<button class="lc-current" disabled>${x.label} <span class="lc-cur-tag">current</span></button>`
        : `<button data-o="${x.o}">${x.label}</button>`).join("")}
    </div>`);
  $$("#sheet .list-choice button[data-o]").forEach(b=>b.addEventListener("click",async()=>{

    const be=await DB.get("batch_entries",beId);
    be.outcome=o;be.outcome_updated_at=Date.now();await DB.put("batch_entries",be);

}

/* ============================================================
   Claim sheet (printable → Save as PDF), with proof photos embedded
   ============================================================ */
async function exportClaimSheet(batchId){
  const batch=await DB.get("batches",batchId); if(!batch) return;
  if(!state.claimantName){ promptClaimantName(()=>exportClaimSheet(batchId)); return; }  // name required on the sheet
  const items=await DB.getByIndex("batch_entries","batch_id",batchId);
  const tot={}; items.forEach(i=>tot[i.currency_snapshot]=(tot[i.currency_snapshot]||0)+i.amount_minor_snapshot);
  const urls=[];
  let entriesHTML="", withProof=0;
  for(let idx=0; idx<items.length; idx++){
    const be=items[idx];
    const live=state.entries.find(x=>x.id===be.entry_id);
    const proofs=await DB.getByIndex("proofs","entry_id",be.entry_id);
    const imgs=proofs.filter(p=>p.file_type&&p.file_type.startsWith("image"));
    const pdfs=proofs.filter(p=>p.file_type&&!p.file_type.startsWith("image"));
    if(imgs.length||pdfs.length) withProof++;
    let proofHTML=imgs.map(p=>{const u=URL.createObjectURL(p.blob);urls.push(u);return `<img src="${u}">`;}).join("");
    if(pdfs.length) proofHTML+=`<div class="ppdf">${pdfs.length} PDF proof${pdfs.length>1?"s":""} attached (not shown)</div>`;
    if(imgs.length===0 && pdfs.length===0) proofHTML=`<div class="pproof-empty"></div>`;
    const type=live?live.type[0].toUpperCase()+live.type.slice(1):"";
    const rows=[
      ["Company",esc(companyName(batch.company_id))],
      type?["Type",type]:null,
      ["Vendor",esc(be.vendor_snapshot)],
      ["Date",fmtDate(be.date_snapshot)],
      (be.original_currency && be.original_currency!==be.currency_snapshot)?["Original",money(be.original_amount_minor,be.original_currency)]:null,
      (live&&live.tags&&live.tags.length)?["Tags",esc(live.tags.join(", "))]:null,
      (live&&live.notes)?["Notes",esc(live.notes)]:null,
    ].filter(Boolean).map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join("");
    const ocLabel={pending:"Pending",reimbursed:"Reimbursed",rejected:"Rejected"}[be.outcome]||"";
    entriesHTML+=`<div class="pitem">
      <div class="pcard">
        <div class="pamt">${money(be.amount_minor_snapshot,be.currency_snapshot)}</div>
        <div class="pcur">${be.currency_snapshot}</div>
        ${ocLabel?`<div class="pstatus">${ocLabel}</div>`:""}
        <table class="pkv">${rows}</table>
      </div>
      <div class="pproof">${proofHTML}</div>
    </div>`;
  }
  const totalHTML=Object.keys(tot).map(c=>money(tot[c],c)).join(" · ");
  const host=document.createElement("div");
  host.className="print-host";
  host.innerHTML=`
    <div class="print-actions">
      <button class="btn btn-primary btn-sm" id="pPrint">Print / Save as PDF</button>
      <button class="btn btn-ghost btn-sm" id="pClose">Close</button>
    </div>
    <div class="psheet">
      <h2>Claim ${esc(batch.claim_no||"")}</h2>
      <table class="pkv psummary">
        <tr><td>Claim ID</td><td>${esc(batch.claim_no||"—")}</td></tr>
        <tr><td>Claimant</td><td>${esc(state.claimantName||"—")}</td></tr>
        <tr><td>Company</td><td>${esc(companyName(batch.company_id))}</td></tr>
        <tr><td>Period</td><td>${fmtDate(batch.range_start)} – ${fmtDate(batch.range_end)}</td></tr>
        <tr><td>Submitted</td><td>${fmtDate(batch.submitted_date)}</td></tr>
        <tr><td>Items</td><td>${items.length}</td></tr>
        <tr><td>Total</td><td>${totalHTML}</td></tr>
        <tr><td>Receipts</td><td>${withProof} of ${items.length} have a receipt</td></tr>
      </table>
      ${entriesHTML}
      <div class="ptotal">Total: ${totalHTML}</div>
    </div>`;
  document.body.appendChild(host);
  const cleanup=()=>{ urls.forEach(u=>URL.revokeObjectURL(u)); host.remove(); };
  host.querySelector("#pClose").addEventListener("click",cleanup);
  host.querySelector("#pPrint").addEventListener("click",()=>window.print());
}

/* ============================================================
   CSV export
   ============================================================ */
function csvEscape(v){v=String(v??"");return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function downloadFile(name,content,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}
async function exportBatchCSV(batchId){
  const batch=await DB.get("batches",batchId);
  const items=await DB.getByIndex("batch_entries","batch_id",batchId);
  const header=["Date","Vendor","Amount","Currency","Outcome"];
  const lines=[header.join(",")];
  items.sort((a,b)=>a.date_snapshot.localeCompare(b.date_snapshot));
  items.forEach(i=>lines.push([i.date_snapshot,csvEscape(i.vendor_snapshot),(i.amount_minor_snapshot/100).toFixed(2),i.currency_snapshot,i.outcome].join(",")));
  // totals
  const tot={};items.forEach(i=>tot[i.currency_snapshot]=(tot[i.currency_snapshot]||0)+i.amount_minor_snapshot);
  lines.push("");
  Object.keys(tot).forEach(c=>lines.push(["","TOTAL "+c,(tot[c]/100).toFixed(2),c,""].join(",")));
  const cname=companyName(batch.company_id).replace(/[^a-z0-9]/gi,"_");
  const fname=batch.claim_no ? batch.claim_no : `claim_${cname}_${batch.submitted_date}`;
  downloadFile(`${fname}.csv`, lines.join("\n"), "text/csv");
  toast("CSV downloaded");
}

async function exportFilteredCSV(){
  const list=filteredEntries();
  if(list.length===0){toast("Nothing to export");return;}
  const header=["Date","Company","Type","Vendor","Amount","Currency","Status","Tags","Notes"];
  const lines=[header.join(",")];
  list.slice().reverse().forEach(e=>lines.push([
    e.payment_date,csvEscape(companyName(e.company_id)),e.type,csvEscape(e.vendor||""),
    (e.amount_minor/100).toFixed(2),e.currency,e.status,csvEscape((e.tags||[]).join("; ")),csvEscape(e.notes||"")
  ].join(",")));
  downloadFile(`ledger_export_${todayISO()}.csv`, lines.join("\n"),"text/csv");
  toast("CSV downloaded");
}

/* ---- file <-> base64 helpers (so receipt images can travel inside a JSON backup) ---- */
function blobToBase64(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(",")[1]||"");r.onerror=()=>rej(r.error);r.readAsDataURL(blob);});}
function base64ToBlob(b64,type){const bin=atob(b64||"");const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:type||"application/octet-stream"});}

async function exportBackup(){
  toast("Preparing backup…");
  const proofsRaw=await DB.getAll("proofs");
  const proofs=[];
  for(const p of proofsRaw){
    proofs.push({id:p.id,entry_id:p.entry_id,file_type:p.file_type,name:p.name,added_at:p.added_at,
      data:await blobToBase64(p.blob)});
  }
  const data={
    app:"ledger", version:2, exported_at:new Date().toISOString(),
    companies:await DB.getAll("companies"),
    entries:await DB.getAll("entries"),
    tags:await DB.getAll("tags"),
    batches:await DB.getAll("batches"),
    batch_entries:await DB.getAll("batch_entries"),
    edits:await DB.getAll("edits"),
    meta:await DB.getAll("meta"),
    proofs,
  };
  downloadFile(`claims_backup_${todayISO()}.json`, JSON.stringify(data), "application/json");
  const now=Date.now();
  await DB.put("meta",{k:"lastBackupAt",v:now});
  state.lastBackupAt=now;
  renderBackupBanner();
  toast(`Backup saved · ${proofs.length} receipt${proofs.length!==1?"s":""} included`);
}

function importBackup(){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept="application/json,.json";
  inp.addEventListener("change",async()=>{
    const f=inp.files&&inp.files[0]; if(!f)return;
    let data;
    try{ data=JSON.parse(await f.text()); }
    catch(e){ toast("Couldn't read that file"); return; }
    if(!data || !Array.isArray(data.entries)){ toast("Not a Claims backup"); return; }
    const counts=`${data.entries.length} entries · ${(data.companies||[]).length} companies · ${(data.proofs||[]).length} receipts`;
    openSheet(`<h3>Restore this backup?</h3>
      <p class="hint" style="margin-bottom:14px;">This <strong>replaces everything</strong> currently in the app with the backup contents:<br>${counts}.<br><br>Best used on a fresh install or to recover lost data.</p>
      <button class="btn btn-danger" id="impYes">Replace &amp; restore</button>
      <button class="btn btn-ghost" id="impNo" style="margin-top:10px;">Cancel</button>`);
    $("#impYes").addEventListener("click",()=>doRestore(data));
    $("#impNo").addEventListener("click",closeSheet);
  });
  inp.click();
}

async function doRestore(data){
  closeSheet();
  toast("Restoring…");
  const stores=["companies","entries","tags","batches","batch_entries","edits","proofs","meta"];
  for(const s of stores){
    const all=await DB.getAll(s);
    for(const rec of all){
      const key = s==="tags"?rec.name : (s==="meta"?rec.k:rec.id);
      await DB.del(s,key);
    }
  }
  if(data.companies) await DB.bulkPut("companies",data.companies);
  if(data.entries) await DB.bulkPut("entries",data.entries);
  if(data.tags) await DB.bulkPut("tags",data.tags);
  if(data.batches) await DB.bulkPut("batches",data.batches);
  if(data.batch_entries) await DB.bulkPut("batch_entries",data.batch_entries);
  if(data.edits) await DB.bulkPut("edits",data.edits);
  if(data.meta) await DB.bulkPut("meta",data.meta);
  if(Array.isArray(data.proofs)){
    const recs=data.proofs.map(p=>({id:p.id,entry_id:p.entry_id,file_type:p.file_type,name:p.name,added_at:p.added_at,blob:base64ToBlob(p.data,p.file_type)}));
    if(recs.length) await DB.bulkPut("proofs",recs);
  }
  await loadAll();
  const now=Date.now();
  await DB.put("meta",{k:"lastBackupAt",v:now});
  state.lastBackupAt=now;
  $$("#screens .screen").forEach(s=>closeScreen(s));
  renderHome();
  setTimeout(()=>toast("Backup restored"),350);
}
